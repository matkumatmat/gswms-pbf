<script>
/**
 * UI Components Library (Vanilla JS)
 */
class UI {
  
  // ==========================================
  // COMPONENT: TOAST NOTIFICATION
  // ==========================================
  static toast(message, type = 'success', duration = 3000) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toastEl = document.createElement('div');
    toastEl.className = `toast ${type}`;
    toastEl.innerText = message;

    container.appendChild(toastEl);

    // Hilangkan setelah durasi habis
    setTimeout(() => {
      toastEl.classList.add('fade-out');
      toastEl.addEventListener('animationend', () => toastEl.remove());
    }, duration);
  }

  // ==========================================
  // COMPONENT: DATA TABLE LOADER
  // ==========================================
  // Render loading state di tabel
  static renderTableLoading(tbodyId, colSpan = 5, message = "Memuat data...") {
    document.getElementById(tbodyId).innerHTML = `
      <tr><td colspan="${colSpan}" style="text-align:center; padding: 30px;">
        <span style="color: var(--primary); font-weight: 500;"> ${message}</span>
      </td></tr>
    `;
  }

  // Render empty state di tabel
  static renderTableEmpty(tbodyId, colSpan = 5, message = "Tidak ada data.") {
    document.getElementById(tbodyId).innerHTML = `
      <tr><td colspan="${colSpan}" style="text-align:center; padding: 30px; color: #64748b;">
         ${message}
      </td></tr>
    `;
  }

  // ==========================================
  // COMPONENT: BUTTON STATE
  // ==========================================
  static setBtnLoading(btnId, isLoading, originalText = "Submit") {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    
    if (isLoading) {
      btn.disabled = true;
      btn.innerHTML = ` Processing...`;
    } else {
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  }
}
</script>
