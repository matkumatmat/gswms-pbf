<script>
  let globalEmbalageData = [];
  let selectedEmbalage = null;

  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      if (document.getElementById('embalage-chart-container')) {
        loadEmbalageDashboard();
        lucide.createIcons();
      }
    }, 50);
  });

  async function loadEmbalageDashboard() {
    const containerChart = document.getElementById('embalage-chart-container');
    if (!containerChart) return; 

    containerChart.innerHTML = '<div style="padding:40px; text-align:center;"><i data-lucide="loader-2" class="lucide-spin" style="color:var(--primary); width:36px; height:36px;"></i></div>';
    lucide.createIcons();

    try {
      const stats = await GasApi.get('getEmbalageDashboard');
      globalEmbalageData = stats;
      renderCharts(stats);
    } catch (error) {
      if (containerChart) {
        containerChart.innerHTML = `<div style="padding:20px; text-align:center; color:#ef4444;">Gagal memuat data: ${error.message}</div>`;
      }
      ToastSystem.show("Gagal menarik data agregasi", "error");
    }
  }

  function renderCharts(data) {
    const container = document.getElementById('embalage-chart-container');
    if (!container) return;

    let html = '';

    data.forEach(item => {
      // Hitung persentase skala (Mentok di stok atau reorder + margin)
      const maxScale = Math.max(item.currentStock, item.reorderPoint) * 1.2;
      const safePct = maxScale > 0 ? (item.safeStock / maxScale) * 100 : 0;
      const reorderPct = maxScale > 0 ? (item.reorderPoint / maxScale) * 100 : 0;
      const currentPct = maxScale > 0 ? (item.currentStock / maxScale) * 100 : 0;

      let barColor = 'var(--primary)';
      let statusText = 'AMAN';
      if (item.status === 'CRIT') { barColor = '#ef4444'; statusText = 'KRITIS (Segera Pesan!)'; }
      else if (item.status === 'WARN') { barColor = '#f59e0b'; statusText = 'REORDER (Persiapan)'; }

      // THE FIX: Inject Tooltip Text di sini
      const tooltipText = `Status: ${statusText} \nSisa Aktual: ${item.currentStock} ${item.satuan} \nBatas Reorder: ${item.reorderPoint} \nBatas Aman: ${item.safeStock}`;

      html += `
        <div class="chart-row">
          <div class="chart-label">
            <span>
              ${item.namaBarang} 
              <span style="font-size:0.7rem; color:var(--text-light); margin-left:6px; font-weight:500; font-family:monospace;">(${item.kodeBarang})</span>
            </span>
            <span class="qty">${item.currentStock} ${item.satuan}</span>
          </div>
          <div class="chart-track" title="${tooltipText}">
            <div class="chart-bar" style="width: ${Math.min(currentPct, 100)}%; background-color: ${barColor};"></div>
            ${item.reorderPoint > 0 ? `<div class="chart-marker marker-reorder" style="left: ${Math.min(reorderPct, 100)}%;" title="Reorder: ${item.reorderPoint}"></div>` : ''}
            ${item.safeStock > 0 ? `<div class="chart-marker marker-safe" style="left: ${Math.min(safePct, 100)}%;" title="Safe Stock: ${item.safeStock}"></div>` : ''}
          </div>
        </div>
      `;
    });

    container.innerHTML = html || '<div style="padding:20px; text-align:center; color:var(--text-light); font-size:0.85rem;">Data chart tidak tersedia.</div>';
  }

  // ===============================================
  // LOGIC MODAL & FORM INPUT 
  // ===============================================
  function openMutasiModal() {
    ModalSystem.show({
      title: 'Catat Mutasi Embalage',
      body: `
        <form id="formEmbalageMutasi" onsubmit="event.preventDefault(); executeSubmitMutasi();">
          <div style="margin-bottom: 16px;">
            <label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-main); text-transform:uppercase; margin-bottom:8px;">Pilih Embalage</label>
            <div class="ui-dropdown-wrapper">
              <input type="text" id="embSearch" placeholder="Ketik nama atau kode..." autocomplete="off" style="width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:8px; outline:none; font-family:inherit;">
              <div id="embDropdown" class="ui-dropdown-list"></div>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
            <div>
              <label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-main); text-transform:uppercase; margin-bottom:8px;">Jenis Mutasi</label>
              <select id="embTipe" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none;">
                <option value="OUT">Distribusi (Keluar)</option>
                <option value="IN">Penerimaan (Masuk)</option>
              </select>
            </div>
            <div>
              <label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-main); text-transform:uppercase; margin-bottom:8px;">Kuantitas (<span id="embSatuanLabel">Pcs</span>)</label>
              <input type="number" id="embQty" min="1" value="1" required style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none;">
            </div>
          </div>

          <div style="margin-bottom: 10px;">
            <label style="display:block; font-size:0.75rem; font-weight:800; color:var(--text-main); text-transform:uppercase; margin-bottom:8px;">Keterangan / Referensi</label>
            <input type="text" id="embKet" placeholder="Contoh: DO-12345 atau Retur" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none;">
          </div>
          
          <button type="submit" style="display:none;"></button>
        </form>
      `,
      footerButtons: [
        { text: 'Batal', type: 'secondary', action: () => ModalSystem.close() },
        { text: 'Simpan', type: 'primary', action: () => executeSubmitMutasi() }
      ]
    });

    selectedEmbalage = null;
    initSearchDropdown(globalEmbalageData);
  }

  function initSearchDropdown(data) {
    new SearchDropdown({
      inputId: 'embSearch',
      dropdownId: 'embDropdown',
      data: data,
      searchKeys: ['kodeBarang', 'namaBarang'],
      renderItem: (item) => `
        <div style="font-weight:700; color:var(--text-main); font-size:0.85rem;">${item.namaBarang}</div>
        <div style="font-size:0.75rem; color:var(--text-light); margin-top:2px;">Kode: ${item.kodeBarang} | Stok: ${item.currentStock} ${item.satuan}</div>
      `,
      onSelect: (item) => {
        selectedEmbalage = item;
        document.getElementById('embSearch').value = item.namaBarang;
        document.getElementById('embSatuanLabel').innerText = item.satuan;
      }
    });
  }

  async function executeSubmitMutasi() {
    if (!selectedEmbalage) {
      ToastSystem.show("Pilih item embalage terlebih dahulu.", "warning");
      return;
    }

    const qty = parseFloat(document.getElementById('embQty').value);
    if (!qty || qty <= 0) {
      ToastSystem.show("Kuantitas tidak valid.", "warning");
      return;
    }

    const btn = document.querySelector('#global-modal-overlay .ui-modal-footer .btn-primary');
    if (btn) btn.classList.add('loading');

    const tipe = document.getElementById('embTipe').value;
    
    const payload = {
      tanggal: new Date().toISOString(),
      noDokumen: document.getElementById('embKet').value || '-',
      kodeBarang: selectedEmbalage.kodeBarang,
      namaBarang: selectedEmbalage.namaBarang,
      kategori: selectedEmbalage.kategori,
      satuan: selectedEmbalage.satuan,
      keterangan: document.getElementById('embKet').value || '-',
      penerimaan: tipe === 'IN' ? qty : 0,
      distribusi: tipe === 'OUT' ? qty : 0
    };

    try {
      await GasApi.post('createEmbalageTransaction', payload);
      ToastSystem.show("Mutasi berhasil dicatat.", "success");
      ModalSystem.close();
      
      // Auto reload data dari sheet pas modal ditutup
      if (document.getElementById('embalage-chart-container')) {
        loadEmbalageDashboard(); 
      }
    } catch (error) {
      ToastSystem.show("Gagal mencatat mutasi: " + error.message, "error");
    } finally {
      if (btn) btn.classList.remove('loading');
    }
  }
</script>
