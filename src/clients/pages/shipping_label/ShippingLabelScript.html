<script>
  // ==========================================
  // GLOBAL STATE
  // ==========================================
  let masterCustomers = [];
  let selectedCustomerPayload = null; 
  let boxConfigs = []; 
  let totalCalculatedBoxes = 0; 
  let globalPrintQueue = [];

  // ==========================================
  // INIT PAGE
  // ==========================================
  document.addEventListener('DOMContentLoaded', () => {
    loadPrintQueue(); 
    loadMasterCustomers();
    renderBoxGrid(); 
    lucide.createIcons();
  });

  // ==========================================
  // LOGIC CUSTOMER (GLOBAL SEARCH DROPDOWN)
  // ==========================================
  async function loadMasterCustomers() {
    try {
      masterCustomers = await GasApi.get('getCustomers', 1); 
      
      // MENGGUNAKAN KOMPONEN AGNOSTIK KITA!
      new SearchDropdown({
        inputId: 'custSearch',
        dropdownId: 'customDropdown',
        data: masterCustomers,
        searchKeys: ['namaKonsumen', 'kotaCabang'],
        renderItem: (item) => `
          <div style="font-weight:700; color:var(--text-main); font-size:0.85rem;">${item.namaKonsumen}</div>
          <div style="font-size:0.75rem; color:var(--text-light); margin-top:2px;">Cabang: ${item.kotaCabang || '-'}</div>
        `,
        onSelect: (cust) => {
          selectedCustomerPayload = cust;
          
          document.getElementById('ccNameBranch').innerText = `${cust.namaKonsumen} - ${cust.kotaCabang || '-'}`;
          document.getElementById('ccAddress').innerHTML = `${cust.alamat || ''}<br>${cust.kota || ''}`;
          document.getElementById('ccContact').innerText = cust.kontak || '-';
          
          document.getElementById('customerCard').style.display = 'block';
          lucide.createIcons();
        }
      });
    } catch (error) {
      ToastSystem.show("Gagal narik data customer!", "error");
    }
  }

  function splitAddress60(fullAddress) {
    if (!fullAddress) return { line1: '', line2: '' };
    let text = fullAddress.trim();
    if (text.length <= 60) return { line1: text, line2: '' };
    let splitIndex = text.lastIndexOf(' ', 60);
    if (splitIndex === -1 || splitIndex === 0) splitIndex = 60; 
    return { 
      line1: text.substring(0, splitIndex).trim(), 
      line2: text.substring(splitIndex).trim().substring(0, 15).trim() 
    };
  }

  // ==========================================
  // LOGIC BOX (GLOBAL MODAL SYSTEM)
  // ==========================================
  function renderBoxGrid() {
    const container = document.getElementById('boxGridContainer');
    container.innerHTML = '';
    totalCalculatedBoxes = 0;

    if(boxConfigs.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding:20px; border:1px dashed var(--border); border-radius:8px; color:var(--text-light); font-size:0.8rem;">Belum ada box. Klik "Tambah Box" di atas.</div>`;
      return;
    }

    boxConfigs.forEach((config, index) => {
      totalCalculatedBoxes += config.count;
      const labelText = config.count > 1 ? `Box ${config.start} - ${config.end}` : `Box ${config.start}`;
      const productsText = config.products.map(p => `• ${p.name} (Qty: ${p.qty})`).join('<br>');
      
      const el = document.createElement('div');
      el.className = 'sl-box-item';
      el.innerHTML = `
        <div style="flex:1;">
          <div class="sl-box-title">${labelText}</div>
          <div class="sl-box-meta">
            <span><i data-lucide="user"></i> ${config.petugas}</span>
            <span><i data-lucide="thermometer"></i> ${config.temp}</span>
          </div>
          <div class="sl-box-products">${productsText}</div>
        </div>
        <button class="btn btn-danger" style="padding:6px; height:max-content;" onclick="deleteBoxConfig(${index})"><i data-lucide="trash-2"></i></button>
      `;
      container.appendChild(el);
    });
    lucide.createIcons();
  }

  function deleteBoxConfig(index) {
    boxConfigs.splice(index, 1);
    recalculateBoxNumbering();
    renderBoxGrid();
  }

  function recalculateBoxNumbering() {
    let currentStart = 1;
    boxConfigs.forEach(config => {
      config.start = currentStart;
      config.end = currentStart + config.count - 1;
      currentStart = config.end + 1;
    });
  }

  // Buka Modal Tambah Box Pake Global Modal
  window.openAddBoxModal = function() {
    ModalSystem.show({
      title: `Konfigurasi Box Baru`,
      body: `
        <div style="display:flex; flex-direction:column; gap:15px; color:var(--text-main);">
          <div>
            <label style="font-size:0.75rem; font-weight:800; margin-bottom:6px; display:block;">Jumlah Box (Config Sama)</label>
            <input type="number" id="modalJmlBox" value="1" min="1" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none;">
          </div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label style="font-size:0.75rem; font-weight:800; margin-bottom:6px; display:block;">Petugas</label>
              <input type="text" id="modalPetugas" value="Kaye" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none;">
            </div>
            <div>
              <label style="font-size:0.75rem; font-weight:800; margin-bottom:6px; display:block;">Berat</label>
              <input type="text" id="modalSuhu" value="2 kg" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none;">
            </div>
          </div>
          <hr style="border:0; border-top:2px dashed var(--border); margin:5px 0;">
          <div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
              <label style="font-size:0.75rem; font-weight:800; margin:0;">Daftar Produk</label>
              <button class="btn btn-secondary" style="padding:6px 10px; font-size:0.7rem;" onclick="addModalProductRow()">+ Tambah Item</button>
            </div>
            <div id="modalProductsContainer" style="display:flex; flex-direction:column; gap:10px;"></div>
          </div>
        </div>
      `,
      footerButtons: [
        { text: 'Batal', type: 'secondary', action: () => ModalSystem.close() },
        { text: 'Simpan Box', type: 'primary', action: () => saveBoxConfigFromModal() }
      ]
    });
    addModalProductRow(); // Munculin baris pertama otomatis
  };

  // Nambah baris input produk di dalem Modal
  window.addModalProductRow = function() {
    const container = document.getElementById('modalProductsContainer');
    const row = document.createElement('div');
    row.style = "display:flex; gap:8px; align-items:center;";
    row.innerHTML = `
      <input type="text" class="m-prod-name" placeholder="Nama Produk" style="flex:2; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none; font-size:0.85rem;">
      <input type="number" class="m-prod-qty" placeholder="Qty" value="1" style="flex:1; padding:10px; border:1px solid var(--border); border-radius:8px; outline:none; font-size:0.85rem;">
      <button class="btn btn-danger" style="padding:10px;" onclick="this.parentElement.remove()"><i data-lucide="x" style="width:16px;"></i></button>
    `;
    container.appendChild(row);
    lucide.createIcons({ root: row });
  };

  window.saveBoxConfigFromModal = function() {
    const count = parseInt(document.getElementById('modalJmlBox').value) || 1;
    const petugas = document.getElementById('modalPetugas').value;
    const temp = document.getElementById('modalSuhu').value;
    
    const products = [];
    document.querySelectorAll('#modalProductsContainer > div').forEach(row => {
      const name = row.querySelector('.m-prod-name').value.trim();
      const qty = row.querySelector('.m-prod-qty').value;
      if(name) products.push({name, qty});
    });

    // if(products.length === 0) { ToastSystem.show("Minimal masukkan 1 produk!", "warning"); return; } // NEED to Update

    boxConfigs.push({ count, petugas, temp, products });
    recalculateBoxNumbering();
    renderBoxGrid();
    ModalSystem.close();
  };

  // ==========================================
  // REVIEW & SUBMIT
  // ==========================================
  window.openConfirmModal = function() {
    if (!selectedCustomerPayload) { ToastSystem.show("Pilih Konsumen dulu!", "warning"); return; }
    if (boxConfigs.length === 0) { ToastSystem.show("Belum ada Konfigurasi Box!", "warning"); return; }

    let boxHtml = boxConfigs.map(c => `
      <div style="margin-bottom:12px; padding-bottom:12px; border-bottom:1px dashed var(--border);">
        <div style="font-weight:800; color:var(--text-main); margin-bottom:4px;">Box ${c.count > 1 ? c.start+'-'+c.end : c.start}</div>
        <div style="font-size:0.8rem; color:var(--text-light); margin-bottom:6px;">Berat: ${c.temp} | Petugas: ${c.petugas}</div> 
        <div style="font-size:0.8rem; font-weight:500;">${c.products.map(p => `• ${p.name} (x${p.qty})`).join('<br>')}</div>
      </div>
    `).join('');

    ModalSystem.show({
      title: 'Konfirmasi Data Label',
      body: `
        <div style="background:#f0fdfa; border:1px solid #ccfbf1; padding:15px; border-radius:10px; margin-bottom:20px;">
          <div style="font-size:0.75rem; color:#0f766e; font-weight:800; text-transform:uppercase; margin-bottom:4px;">Penerima</div>
          <div style="font-weight:800; color:#0f766e; font-size:1.1rem;">${selectedCustomerPayload.namaKonsumen}</div>
          <div style="font-size:0.85rem; color:#0d9488; margin-bottom:10px;">Cabang: ${selectedCustomerPayload.kotaCabang || '-'}</div>
          <span class="ui-badge ui-badge-primary">TOTAL: ${totalCalculatedBoxes} BOX FISIK</span>
        </div>
        <div style="font-weight:800; font-size:0.85rem; margin-bottom:10px; text-transform:uppercase;">Rincian Box</div>
        <div>${boxHtml}</div>
      `,
      footerButtons: [
        { text: 'Edit Lagi', type: 'secondary', action: () => ModalSystem.close() },
        { text: 'Simpan ke Database', type: 'primary', action: () => executeSubmitPayload() }
      ]
    });
  };

  async function executeSubmitPayload() {
    ModalSystem.close(); 
    Loader.show('Merakit Data & Menyimpan ke Database...'); 
    const alamatLengkap = `${selectedCustomerPayload.alamat || ''}, ${selectedCustomerPayload.kota || ''}`;
    const finalAlamat = splitAddress60(alamatLengkap);
    
    const recipient = {
      customer: selectedCustomerPayload.namaKonsumen,
      branch: selectedCustomerPayload.kotaCabang || '',
      address_line_1: finalAlamat.line1,
      address_line_2: finalAlamat.line2,
      contact: `${selectedCustomerPayload.pic || ''} - ${selectedCustomerPayload.kontak || ''}`
    };

    const expandedBoxesPayload = [];
    boxConfigs.forEach(config => {
      for (let i = config.start; i <= config.end; i++) {
        expandedBoxesPayload.push({
          current_box: i,
          petugas: config.petugas,
          temperature: config.temp,
          products: JSON.parse(JSON.stringify(config.products)) 
        });
      }
    });

    const finalPayload = {
      customerId: selectedCustomerPayload.id || "CUST-DUMMY", 
      namaCustomer: selectedCustomerPayload.namaKonsumen,     
      cabangCustomer: selectedCustomerPayload.kotaCabang || '', 
      noDokumen: "DOC-" + Date.now(),
      payloadRecipient: recipient,
      payloadTotalBox: totalCalculatedBoxes, 
      payloadBoxes: expandedBoxesPayload,    
      payloadQr: {}
    };

    try {
      await GasApi.post("createShippingLabel", finalPayload);
      ToastSystem.show("Sukses! Data masuk ke antrian.", "success");
      
      // Reset Form UI
      boxConfigs = [];
      renderBoxGrid();
      document.getElementById('custSearch').value = '';
      document.getElementById('customerCard').style.display = 'none';
      selectedCustomerPayload = null;

      loadPrintQueue(); // Refresh tabel antrian
    } catch (error) {
      ToastSystem.show("Waduh Gagal: " + error.message, "error");
    } finally {
      Loader.hide();
    }
  }

  // ==========================================
  // LOGIC ANTRIAN CETAK & PRINTER LOCALHOST
  // ==========================================
  async function loadPrintQueue() {
    document.getElementById('print-queue-container').innerHTML = '<div style="padding:30px; text-align:center; color:var(--primary);"><i data-lucide="loader-2" class="lucide-spin" style="width:30px; height:30px;"></i></div>';
    lucide.createIcons();

    try {
      const data = await GasApi.get('getShippingLabels', 1, 5000); 
      
      const today = new Date();
      globalPrintQueue = data.filter(item => {
        if (!item || !item.tanggal) return false;
        const itemDate = new Date(item.tanggal);
        const isToday = itemDate.getDate() === today.getDate() && 
                        itemDate.getMonth() === today.getMonth() && 
                        itemDate.getFullYear() === today.getFullYear();
        const isBelumCetak = (item.printStatus === 'BELUM_CETAK' || !item.printStatus);
        return isToday && isBelumCetak;
      });

      document.getElementById('summaryCount').innerText = globalPrintQueue.length;

      // SIAPIN DATA UNTUK AGNOSTIC TABLE KITA
      if(globalPrintQueue.length > 0) {
        const tableData = globalPrintQueue.map(label => {
          const custName = label.payloadRecipient?.customer || 'Unknown';
          return {
            dokumen: `<strong style="color:var(--primary);">${label.noDokumen}</strong><br><span style="font-size:0.75rem; color:var(--text-light);">${Formatter.date(label.tanggal)}</span>`,
            customer: `<span style="font-weight:600;">${custName}</span>`,
            qty: `<b>${label.payloadTotalBox}</b> Box`,
            status: `<span class="ui-badge ui-badge-warning">BELUM CETAK</span>`,
            // Panggil global function window.processPrint
            aksi: `<button class="btn btn-secondary" style="padding:6px 12px; font-size:0.75rem;" onclick="processPrint('${label.id}')"><i data-lucide="printer" style="width:14px; margin-right:4px;"></i> Cetak</button>`
          };
        });

        // RENDER AGNOSTIC TABLE
        new DataTable({
          containerId: 'print-queue-container',
          headers: [
            { label: 'Dokumen', key: 'dokumen' },
            { label: 'Konsumen', key: 'customer' },
            { label: 'Qty', key: 'qty' },
            { label: 'Status', key: 'status' },
            { label: 'Aksi', key: 'aksi' }
          ],
          data: tableData
        });
      } else {
        document.getElementById('print-queue-container').innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-light); font-size:0.9rem;">Hore! Semua label hari ini sudah dicetak.</div>';
      }

    } catch (error) {
      document.getElementById('print-queue-container').innerHTML = `<div style="padding:30px; text-align:center; color:#ef4444;">Error: ${error.message}</div>`;
    }
  }

  // Bridging biar button di dalem Table bisa manggil function ini
  window.processPrint = function(id) {
    const labelData = globalPrintQueue.find(x => x.id === id);
    if(labelData) sendToPrinter(labelData);
  }

  async function sendToPrinter(labelData) {
    const LOCAL_PRINTER_URL = 'http://localhost:8080/print/shipping'; 
    const payloadGo = {
      recipient: labelData.payloadRecipient,
      total_box: labelData.payloadTotalBox,
      boxes: labelData.payloadBoxes
    };

    Loader.show('Mengirim data ke Printer Lokal...'); // Animasi nyambung ke Go-lang!

    try {
      const response = await fetch(LOCAL_PRINTER_URL, {
        method: 'POST',
        mode: 'cors', 
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payloadGo)
      });

      if (response.ok) {
        ToastSystem.show("Printer Zebra sedang memproses label!", "success");
        try {
          Loader.show('Mengupdate Status ke Database...');
          await GasApi.post('updatePrintStatus', { id: labelData.id, status: 'SUDAH_CETAK' });
          ToastSystem.show("Status berhasil diupdate!", "success");
          loadPrintQueue(); 
        } catch (gasError) {
          ToastSystem.show("Gagal update status: " + gasError.message, "error");
        }
      } else {
        ToastSystem.show("Respon lokal printer gagal!", "error");
      }
    } catch (error) {
      ToastSystem.show("Gagal konek ke Golang Server (Port 8080)!", "error");
    } finally {
      Loader.hide();
    }
  }
</script>
