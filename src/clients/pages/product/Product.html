<style>
  @media (min-width: 1024px) {
    .panel-kanan { position: sticky; top: 90px; }
  }

  /* === BULK PRINT === */
  .batch-check {
    width: 18px; height: 18px; cursor: pointer;
    accent-color: var(--primary); flex-shrink: 0;
  }

  /* Floating Action Bar */
  .bulk-fab {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--primary);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50px;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 8px 32px rgba(0,171,189,0.4);
    z-index: 9999;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    white-space: nowrap;
  }
  .bulk-fab.visible {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(0);
  }
  @media (min-width: 1024px) { .bulk-fab { bottom: 30px; } }

  /* Print queue rows in modal */
  .pi-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .pi-row:last-child { border-bottom: none; }
  .pi-qty-input {
    width: 60px; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 6px;
    text-align: center; font-size: 0.85rem; font-weight: 700;
    outline: none; flex-shrink: 0;
    transition: border-color 0.2s;
  }
  .pi-qty-input:focus { border-color: var(--primary); }
</style>

<!-- Floating Action Bar (Bulk Print) -->
<div class="bulk-fab" id="bulkFab">
  <i data-lucide="printer" style="width:18px; color:#fff;"></i>
  <span style="color:#fff; font-weight:800; font-size:0.9rem;">
    <span id="fabCount">0</span> batch dipilih
  </span>
  <button class="btn" style="background:rgba(255,255,255,0.2); color:#fff; padding:5px 12px; font-size:0.75rem;" onclick="clearSelection()">
    Reset
  </button>
  <button class="btn" style="background:#fff; color:var(--primary); padding:5px 14px; font-size:0.8rem; font-weight:800;" onclick="openBulkPrintModal()">
    <i data-lucide="printer" style="width:14px;"></i> Cetak Label
  </button>
</div>

<div class="ui-subheader">
  <div class="ui-subheader-icon"><i data-lucide="package-search"></i></div>
  <div class="ui-subheader-text">
    <h2>Katalog Produk</h2>
    <p>Overview produk, batch aktif, dan cetak label identitas massal.</p>
  </div>
</div>

<div class="grid-3-2" style="align-items: start;">

  <div class="ui-card">
    <div class="ui-card-header">
      <span>Daftar Produk</span>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn btn-secondary" id="btnSelectAll"
          style="padding:4px 10px; font-size:0.75rem; display:none;" onclick="selectAllVisible()">
          <i data-lucide="check-square" style="width:13px;"></i> Pilih Semua
        </button>
        <button class="btn btn-secondary" id="btnToggleBulk" style="padding:6px 12px; font-size:0.8rem;" onclick="toggleBulkMode()">
          <i data-lucide="layers" style="width:14px;"></i> Bulk Print
        </button>
      </div>
    </div>
    <div class="ui-card-body">

      <!-- Filter info (bulk mode only) -->
      <div id="bulkFilterBar" style="display:none; padding:10px 14px; background:var(--primary-light);
           border-radius:8px; margin-bottom:16px; font-size:0.8rem; color:var(--primary); font-weight:600; line-height:1.5;">
        <i data-lucide="filter" style="width:13px; vertical-align:text-bottom;"></i>
        Mode Bulk Print — hanya batch <b>status=RECEIVED</b> dan <b>sysStatus ≠ CLOSED / EXPIRED</b>.
      </div>

      <div class="ui-dropdown-wrapper" style="margin-bottom: 20px;">
        <i data-lucide="search" style="position:absolute; left:12px; top:12px; color:var(--text-light); width:18px;"></i>
        <input type="text" id="prodSearch" placeholder="Cari Kode Barang atau Nama Produk..." autocomplete="off"
               style="width:100%; padding:12px 14px 12px 38px; border:1px solid var(--border); border-radius:10px; outline:none;">
      </div>

      <div id="table-products-container"></div>
    </div>
  </div>

  <div class="ui-card panel-kanan" id="aggregate-panel">
    <div class="ui-card-header" style="background: var(--primary-light); color: var(--primary-dark);">
      <i data-lucide="pie-chart" style="margin-right:8px; width:18px;"></i> Analisis Distribusi Batch
    </div>
    <div class="ui-card-body" id="aggregate-container">
      <div style="text-align:center; padding:40px 20px; color:var(--text-light); font-size:0.85rem;">
        <i data-lucide="mouse-pointer-click" style="width:40px; height:40px; margin-bottom:10px; opacity:0.5;"></i><br>
        Klik tombol <b>Analisis</b> pada batch di samping untuk melihat riwayat distribusi.
      </div>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // STATE
  // ============================================================
  let groupedProducts = [];
  let isBulkMode = false;
  let selectedBatches = new Map(); // id -> batch object

  const BULK_SYS_EXCLUDED = ['CLOSED', 'EXPIRED'];

  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    loadAllProducts();

    document.getElementById('prodSearch').addEventListener('input', (e) => {
      const kw = e.target.value.toLowerCase().trim();
      const src = isBulkMode ? bulkGroupedProducts : groupedProducts;
      const filtered = kw === '' ? src.slice(0, 50) :
        src.filter(p =>
          (p.namaDagang && p.namaDagang.toLowerCase().includes(kw)) ||
          (p.kodeBarangOld && p.kodeBarangOld.toLowerCase().includes(kw)) ||
          (p.kodeBarangNew && p.kodeBarangNew.toLowerCase().includes(kw))
        ).slice(0, 50);
      renderGroupedTable(filtered);
    });
  });

  // ============================================================
  // DATA LOADING
  // ============================================================
  let bulkGroupedProducts = [];

  async function loadAllProducts() {
    const container = document.getElementById('table-products-container');
    container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--primary);"><i data-lucide="loader-2" class="lucide-spin"></i> Menarik Data Master...</div>';
    lucide.createIcons();

    try {
      const batches = await GasApi.get('getActiveReceivedBatches', 1, 5000);

      const productMap = new Map();
      batches.forEach(b => {
        const key = b.namaBarangDagang;
        if (!productMap.has(key)) {
          productMap.set(key, {
            namaDagang: b.namaBarangDagang,
            kodeBarangOld: b.kodeBarangOld,
            kodeBarangNew: b.kodeBarangNew,
            batches: []
          });
        }
        productMap.get(key).batches.push(b);
      });

      groupedProducts = Array.from(productMap.values());
      renderGroupedTable(groupedProducts.slice(0, 30));
    } catch (error) {
      ToastSystem.show('Gagal narik data produk!', 'error');
    }
  }

  // Bulk mode: fetch with table schema so status + sysStatus are available
  async function loadBulkProducts() {
    const container = document.getElementById('table-products-container');
    container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--primary);"><i data-lucide="loader-2" class="lucide-spin"></i> Memuat data Bulk Print...</div>';
    lucide.createIcons();

    try {
      // queryBatch with table schema → has status, sysStatus, alokasi
      const batches = await GasApi.query('queryBatch', {
        limit: 5000,
        schema: 'table',
        filters: { status: 'RECEIVED' }
      });

      // Client-side: exclude CLOSED & EXPIRED sysStatus
      const filtered = batches.filter(b => {
        const sys = String(b.sysStatus || '').toUpperCase();
        const status = String(b.status || '').toUpperCase();
        return !BULK_SYS_EXCLUDED.includes(sys) && status === 'RECEIVED';
      });

      const productMap = new Map();
      filtered.forEach(b => {
        const key = b.namaBarangDagang || b.namaBarangErp || 'UNKNOWN';
        if (!productMap.has(key)) {
          productMap.set(key, {
            namaDagang: key,
            kodeBarangOld: b.kodeBarangOld,
            kodeBarangNew: b.kodeBarangNew,
            batches: []
          });
        }
        productMap.get(key).batches.push(b);
      });

      bulkGroupedProducts = Array.from(productMap.values());

      const total = filtered.length;
      ToastSystem.show(`${total} batch eligible untuk bulk print.`, 'info');
      renderGroupedTable(bulkGroupedProducts.slice(0, 50));
    } catch (error) {
      ToastSystem.show('Gagal memuat data bulk: ' + error.message, 'error');
    }
  }

  // ============================================================
  // BULK MODE TOGGLE
  // ============================================================
  function toggleBulkMode() {
    isBulkMode = !isBulkMode;
    const btn = document.getElementById('btnToggleBulk');
    const filterBar = document.getElementById('bulkFilterBar');
    const selectAllBtn = document.getElementById('btnSelectAll');

    if (isBulkMode) {
      btn.className = 'btn btn-primary';
      btn.innerHTML = '<i data-lucide="x" style="width:14px;"></i> Keluar Bulk';
      filterBar.style.display = 'block';
      selectAllBtn.style.display = 'inline-flex';
      clearSelection();
      loadBulkProducts();
    } else {
      btn.className = 'btn btn-secondary';
      btn.innerHTML = '<i data-lucide="layers" style="width:14px;"></i> Bulk Print';
      filterBar.style.display = 'none';
      selectAllBtn.style.display = 'none';
      clearSelection();
      // re-render aggregate panel hint
      document.getElementById('aggregate-container').innerHTML = `
        <div style="text-align:center; padding:40px 20px; color:var(--text-light); font-size:0.85rem;">
          <i data-lucide="mouse-pointer-click" style="width:40px; height:40px; margin-bottom:10px; opacity:0.5;"></i><br>
          Klik tombol <b>Analisis</b> pada batch di samping.
        </div>`;
      renderGroupedTable(groupedProducts.slice(0, 30));
    }
    lucide.createIcons();
  }

  // ============================================================
  // SELECTION MANAGEMENT
  // ============================================================
  function toggleBatchSelection(batchId, cb) {
    if (!batchId) return;
    const rawObj = cb.dataset.obj;
    const batchObj = rawObj ? JSON.parse(rawObj) : null;

    if (cb.checked && batchObj) {
      selectedBatches.set(batchId, batchObj);
    } else {
      selectedBatches.delete(batchId);
    }
    updateFab();
  }

  function selectAllVisible() {
    document.querySelectorAll('.batch-check').forEach(cb => {
      if (!cb.checked && cb.dataset.obj) {
        cb.checked = true;
        selectedBatches.set(cb.dataset.id, JSON.parse(cb.dataset.obj));
      }
    });
    updateFab();
  }

  function clearSelection() {
    selectedBatches.clear();
    document.querySelectorAll('.batch-check').forEach(cb => (cb.checked = false));
    updateFab();
  }

  function updateFab() {
    const fab = document.getElementById('bulkFab');
    const count = selectedBatches.size;
    document.getElementById('fabCount').textContent = count;
    fab.classList.toggle('visible', count > 0 && isBulkMode);
  }

  // ============================================================
  // RENDER TABLE
  // ============================================================
  function renderGroupedTable(data) {
    const container = document.getElementById('table-products-container');
    if (data.length === 0) {
      container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-light); font-size:0.85rem;">Tidak ada produk yang cocok.</div>';
      return;
    }

    let html = '<div style="display:flex; flex-direction:column; gap:10px;">';

    data.forEach((prod, idx) => {
      html += `
        <div style="border:1px solid var(--border); border-radius:10px; background:#fff; overflow:hidden;">
          <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:0.2s;"
               onclick="toggleBatchList('blist-${idx}')"
               onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
            <div>
              <strong style="font-size:0.95rem; color:var(--text-main); line-height:1.2; display:block; margin-bottom:4px;">${prod.namaDagang}</strong>
              <span style="font-size:0.75rem; color:var(--text-light); font-family:monospace;">
                Old: <span style="font-weight:600; color:var(--text-main);">${prod.kodeBarangOld || '-'}</span> |
                New: <span style="font-weight:600; color:var(--text-main);">${prod.kodeBarangNew || '-'}</span> |
                <b style="color:var(--primary);">${prod.batches.length} Batch</b>
              </span>
            </div>
            <i data-lucide="chevron-down" style="color:var(--text-light); width:18px;"></i>
          </div>

          <div id="blist-${idx}" style="display:none; border-top:1px solid var(--border); padding:10px; background:#fafafa;">
            <table class="ui-table" style="font-size:0.75rem; background:#fff; border-radius:8px; margin:0;">
              <thead><tr>
                ${isBulkMode ? '<th style="width:36px; text-align:center;"><i data-lucide="check-square" style="width:13px;"></i></th>' : ''}
                <th>Batch</th>
                ${isBulkMode ? '<th>Sys Status</th>' : ''}
                <th>Exp. Date</th>
                <th style="text-align:right;">Aksi</th>
              </tr></thead>
              <tbody>`;

      prod.batches.forEach(b => {
        const cleanDate = Formatter.date(b.expiryDate || b.expireDate || '').split(',')[0];
        const bId = b.id || '';
        const sys = (b.sysStatus || '').toUpperCase();
        const badgeCss = sys === 'ACTIVE' ? 'success' : (sys === 'INACTIVE' ? 'warning' : 'neutral');

        // Escape for data attribute
        const bObjJson = isBulkMode
          ? JSON.stringify(b).replace(/'/g, '&#39;').replace(/"/g, '&quot;')
          : '';

        html += `<tr>`;

        if (isBulkMode) {
          const isChecked = selectedBatches.has(bId) ? 'checked' : '';
          html += `
            <td style="text-align:center; padding-left:8px;">
              <input type="checkbox" class="batch-check"
                data-id="${bId}"
                data-obj="${bObjJson}"
                ${isChecked}
                onclick="event.stopPropagation(); toggleBatchSelection('${bId}', this)">
            </td>`;
        }

        html += `<td style="font-family:monospace; font-weight:600;">${b.batch}</td>`;

        if (isBulkMode) {
          html += `<td>
            <span class="ui-badge ui-badge-${badgeCss}" style="font-size:0.6rem; padding:2px 6px;">${sys || '-'}</span>
          </td>`;
        }

        html += `
          <td style="color:#ef4444; font-weight:600;">${cleanDate}</td>
          <td style="text-align:right; display:flex; gap:6px; justify-content:flex-end;">
            ${!isBulkMode
              ? `<button class="btn btn-secondary" style="padding:4px 8px; font-size:0.65rem;"
                   onclick="loadAggregate('${b.batch}', '${(prod.namaDagang || '').replace(/'/g, "\\'").replace(/\n/g,' ')}')">
                   Analisis
                 </button>`
              : ''
            }
            <a href="?page=detail&id=${bId}" class="btn btn-primary" style="padding:4px 8px; font-size:0.65rem; text-decoration:none;">
              Detail
            </a>
          </td>
        </tr>`;
      });

      html += `</tbody></table></div></div>`;
    });

    html += '</div>';
    container.innerHTML = html;
    lucide.createIcons();
  }

  function toggleBatchList(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  // ============================================================
  // BULK PRINT MODAL
  // ============================================================
  function openBulkPrintModal() {
    if (selectedBatches.size === 0) return;

    let itemsHtml = '';
    selectedBatches.forEach((b, id) => {
      const pCode = (b.kodeBarangNew && b.kodeBarangNew !== '-')
        ? b.kodeBarangNew : (b.kodeBarangOld || '-');
      const expDate = Formatter.date(b.expiryDate || b.expireDate || '').split(',')[0];
      const sys = b.sysStatus || '-';
      const badge = sys.toUpperCase() === 'ACTIVE' ? 'success' : 'warning';
      const safeName = (b.namaBarangDagang || b.namaBarangErp || '-').replace(/</g, '&lt;');

      itemsHtml += `
        <div class="pi-row">
          <div style="flex:1; min-width:0;">
            <div style="font-weight:800; font-size:0.85rem; color:var(--text-main);
                 white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${safeName}</div>
            <div style="font-size:0.7rem; color:var(--text-light); font-family:monospace; margin-top:2px;">
              ${pCode} |
              Batch: <b style="color:var(--primary);">${b.batch}</b> |
              Exp: ${expDate}
              <span class="ui-badge ui-badge-${badge}" style="font-size:0.55rem; padding:1px 5px; margin-left:4px;">${sys}</span>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:6px; flex-shrink:0;">
            <span style="font-size:0.7rem; color:var(--text-light);">Qty:</span>
            <input type="number" class="pi-qty-input" data-batchid="${id}" value="1" min="1" max="500">
          </div>
        </div>`;
    });

    const totalBatches = selectedBatches.size;

    ModalSystem.show({
      title: `Cetak Label — ${totalBatches} Batch`,
      body: `
        <div style="margin-bottom:12px; padding:10px 12px; background:#f0fdfa;
             border-radius:8px; border:1px solid #ccfbf1; font-size:0.8rem; color:#0f766e;">
          <i data-lucide="info" style="width:13px; vertical-align:middle;"></i>
          Atur jumlah label per-batch. Pastikan service Go-lang berjalan di port <b>8080</b>.
        </div>
        <div style="max-height:420px; overflow-y:auto; padding-right:4px;">
          ${itemsHtml}
        </div>
        <div id="bulkTotalCount" style="margin-top:12px; padding:8px 12px;
             background:#f8fafc; border-radius:8px; font-size:0.8rem;
             font-weight:700; color:var(--text-main); text-align:right; border-top:1px solid var(--border);">
          Total label: <span style="color:var(--primary);" id="totalLabelCount">–</span>
        </div>`,
      footerButtons: [
        { text: 'Batal', type: 'secondary', action: () => ModalSystem.close() },
        { text: `Kirim ke Printer`, type: 'primary', action: () => executeBulkPrint() }
      ]
    });

    lucide.createIcons();

    // Live total counter
    const updateTotal = () => {
      let total = 0;
      document.querySelectorAll('.pi-qty-input').forEach(inp => total += parseInt(inp.value) || 0);
      const el = document.getElementById('totalLabelCount');
      if (el) el.textContent = total;
    };
    setTimeout(() => {
      document.querySelectorAll('.pi-qty-input').forEach(inp => {
        inp.addEventListener('input', updateTotal);
      });
      updateTotal();
    }, 50);
  }

  // ============================================================
  // EXECUTE BULK PRINT
  // ============================================================
  async function executeBulkPrint() {
    const identities = [];

    const formatDDMMYYYY = (dateStr) => {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return '-';
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      return `${dd}/${mm}/${d.getFullYear()}`;
    };

    const splitName = (fullName) => {
      const name = (fullName || '-').replace(/\n/g, ' ').trim();
      if (name.length <= 20) return { name1: name, name2: '' };
      const idx = name.lastIndexOf(' ', 20);
      return idx > 0
        ? { name1: name.substring(0, idx), name2: name.substring(idx + 1) }
        : { name1: name.substring(0, 20), name2: name.substring(20) };
    };

    // Collect qty per batch from modal
    const qtyMap = {};
    document.querySelectorAll('.pi-qty-input').forEach(inp => {
      qtyMap[inp.dataset.batchid] = parseInt(inp.value) || 1;
    });

    ModalSystem.close();
    Loader.show('Merakit payload label...');

    // FIX 1: Gunakan template tag GAS agar dieksekusi di server seperti productdetail
    const extApiUrl = "<?= AppConfig.EXTERNAL_API_PRODUCT_DETAIL ?>";

    selectedBatches.forEach((b, id) => {
      const qty = qtyMap[id] || 1;
      const pCode = (b.kodeBarangNew && b.kodeBarangNew !== '-')
        ? b.kodeBarangNew : (b.kodeBarangOld || '-');
      const { name1, name2 } = splitName(b.namaBarangDagang || b.namaBarangErp);
      
      const expDate = formatDDMMYYYY(b.expiryDate || b.expireDate);
      
      // FIX 2: Tarik format tanggalnya dari object batch
      const mfgDate = formatDDMMYYYY(b.manufacturingDate);
      const rcvDate = formatDDMMYYYY(b.createdAt);

      const singlePayload = {
        product_code:    pCode,
        product_name_1:  name1,
        product_name_2:  name2,
        batch_number:    b.batch,
        allocation:      b.alokasi || '-',
        mfg_date:        mfgDate, // <-- Sudah di-fix
        exp_date:        expDate,
        receive_date:    rcvDate, // <-- Sudah di-fix
        qr_code:         b.id,
        // FIX 3: extApiUrl sekarang pasti terisi string link dari server
        qr_code_ext:     extApiUrl ? `${extApiUrl}?id=${b.id}` : b.id
      };

      for (let i = 0; i < qty; i++) identities.push({ ...singlePayload });
    });

    const totalLabels = identities.length;

    try {
      const response = await fetch('http://localhost:8080/print/identity', {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identities })
      });

      if (response.ok) {
        ToastSystem.show(`${totalLabels} label dikirim ke printer!`, 'success');
        clearSelection();
      } else {
        const errText = await response.text().catch(() => '–');
        ToastSystem.show(`Printer menolak (${response.status}): ${errText}`, 'error');
      }
    } catch (e) {
      ToastSystem.show('Gagal konek ke Go-lang server (port 8080). Pastikan service berjalan!', 'error');
    } finally {
      Loader.hide();
    }
  }

  // ============================================================
  // AGGREGATE (unchanged logic, cleaned up)
  // ============================================================
  async function loadAggregate(batchNo, namaProduk) {
    const container = document.getElementById('aggregate-container');
    container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--primary);"><i data-lucide="loader-2" class="lucide-spin" style="width:30px; height:30px;"></i><br><br>Menarik Log Mutasi Fisik...</div>';
    lucide.createIcons();

    if (window.innerWidth < 1024) {
      document.getElementById('aggregate-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    try {
      const history = await GasApi.post('getBatchHistoryV2', { batchNo });
      const agg = {};
      let runningBalance = 0;
      const historyWithBalance = [];

      const parseIdn = (val) => {
        if (!val) return 0;
        if (typeof val === 'number') return val;
        return parseFloat(String(val).replace(/\./g, '').replace(',', '.')) || 0;
      };

      history.forEach(h => {
        const ket = String(h.keterangan || '').toUpperCase().trim();
        const kons = String(h.namaKonsumen || '').toUpperCase().trim();
        const dist = parseIdn(h.distribusi);
        const pen = parseIdn(h.penerimaan);
        if (!ket.includes('REVISI') && !kons.includes('SALDO AWAL')) {
          if (dist > 0) agg[kons] = (agg[kons] || 0) + dist;
          runningBalance += pen - dist;
          historyWithBalance.push({
            tanggal: h.tanggal, konsumen: kons, cabang: h.kotaCabang || '-',
            distribusi: dist, penerimaan: pen, saldo: runningBalance,
            tipe: dist > 0 ? 'OUT' : 'IN'
          });
        }
      });

      if (historyWithBalance.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:20px;font-size:0.85rem;color:var(--text-light);">Belum ada riwayat valid untuk <b>${batchNo}</b></div>`;
        return;
      }

      const sortedAgg = Object.keys(agg).map(k => ({ customer: k, total: agg[k] }))
        .sort((a, b) => b.total - a.total).slice(0, 5);

      let html = `
        <div style="font-weight:800;color:var(--primary);margin-bottom:4px;font-size:1rem;">${namaProduk}</div>
        <div style="font-size:0.8rem;color:var(--text-light);margin-bottom:15px;font-family:monospace;">Batch: ${batchNo}</div>`;

      if (sortedAgg.length > 0) {
        const icons = ['<i data-lucide="trophy" style="width:14px;color:#eab308;margin-right:4px;"></i>',
                       '<i data-lucide="medal" style="width:14px;color:#94a3b8;margin-right:4px;"></i>',
                       '<i data-lucide="medal" style="width:14px;color:#b45309;margin-right:4px;"></i>'];
        html += `<table class="ui-table" style="font-size:0.75rem;margin-bottom:20px;"><thead><tr><th>Top Distribusi</th><th style="text-align:right;">Total</th></tr></thead><tbody>`;
        sortedAgg.forEach((item, i) => {
          const bold = i < 3 ? 'font-weight:800;color:var(--text-main);' : '';
          html += `<tr>
            <td style="display:flex;align-items:center;">${icons[i] || ''}<span style="${bold}">${item.customer}</span></td>
            <td style="text-align:right;${bold}">${item.total.toLocaleString('id-ID')}</td>
          </tr>`;
        });
        html += `</tbody></table>`;
      }

      const latest = historyWithBalance.reverse().slice(0, 10);
      html += `<div style="font-weight:800;font-size:0.8rem;text-transform:uppercase;color:var(--text-main);
                    margin-bottom:10px;padding-top:10px;border-top:2px dashed var(--border);">10 Transaksi Terakhir</div>
               <div style="display:flex;flex-direction:column;gap:10px;">`;

      latest.forEach(h => {
        const isOut = h.tipe === 'OUT';
        const color = isOut ? '#ef4444' : '#10b981';
        const val = isOut ? h.distribusi : h.penerimaan;
        html += `
          <div style="background:#f8fafc;border:1px solid var(--border);border-left:4px solid ${color};border-radius:8px;padding:12px;font-size:0.8rem;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="color:var(--text-light);font-size:0.7rem;">${Formatter.date(h.tanggal)}</span>
              <span style="font-weight:800;color:var(--primary);">Saldo: ${h.saldo.toLocaleString('id-ID')}</span>
            </div>
            <div style="font-weight:800;color:var(--text-main);margin-bottom:4px;">${h.konsumen}${h.cabang !== '-' ? ` — ${h.cabang}` : ''}</div>
            <div style="color:${color};font-weight:800;font-size:0.9rem;">
              <i data-lucide="${isOut ? 'arrow-up-right' : 'arrow-down-left'}" style="width:16px;"></i>
              ${isOut ? '-' : '+'}${val.toLocaleString('id-ID')}
            </div>
          </div>`;
      });

      html += `</div>`;
      container.innerHTML = html;
      lucide.createIcons({ root: container });
    } catch (error) {
      container.innerHTML = `<div style="text-align:center;padding:20px;color:#ef4444;font-size:0.85rem;">Gagal menarik data histori.</div>`;
    }
  }
</script>
