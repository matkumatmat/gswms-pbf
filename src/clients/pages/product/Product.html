<style>
  @media (min-width: 1024px) {
    .panel-kanan { position: sticky; top: 90px; }
  }
</style>

<div class="ui-subheader">
  <div class="ui-subheader-icon"><i data-lucide="package-search"></i></div>
  <div class="ui-subheader-text">
    <h2>Katalog & Inventaris</h2>
    <p>Overview produk, daftar batch aktif, dan histori distribusi.</p>
  </div>
</div>

<div class="grid-3-2" style="align-items: start;">
  
  <div class="ui-card">
    <div class="ui-card-header">Daftar Produk</div>
    <div class="ui-card-body">
      <div class="ui-dropdown-wrapper" style="margin-bottom: 20px;">
        <i data-lucide="search" style="position:absolute; left:12px; top:12px; color:var(--text-light); width:18px;"></i>
        <input type="text" id="prodSearch" placeholder="Cari Kode Barang atau Nama Produk..." autocomplete="off" 
               style="width:100%; padding:12px 14px 12px 38px; border:1px solid var(--border); border-radius:10px; outline:none;">
      </div>
      <div id="table-products-container"></div>
    </div>
  </div>

  <div class="ui-card panel-kanan" id="aggregate-panel">
    <div class="ui-card-header" style="background: var(--primary-light); color: var(--primary-dark);">
      <i data-lucide="pie-chart" style="margin-right:8px; width:18px;"></i> Analisis Distribusi Batch
    </div>
    <div class="ui-card-body" id="aggregate-container">
      <div style="text-align:center; padding:40px 20px; color:var(--text-light); font-size:0.85rem;">
        <i data-lucide="mouse-pointer-click" style="width:40px; height:40px; margin-bottom:10px; opacity:0.5;"></i><br>
        Klik tombol <b>Analisis</b> pada batch di samping untuk melihat riwayat distribusi.
      </div>
    </div>
  </div>

</div>

<script>
  let groupedProducts = [];
  
  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    loadAllProducts();

    // The Fix: Nyari bisa lewat kode lama, kode baru, atau nama!
    document.getElementById('prodSearch').addEventListener('input', (e) => {
      const keyword = e.target.value.toLowerCase().trim();
      if(keyword === '') {
        renderGroupedTable(groupedProducts.slice(0, 30)); 
      } else {
        const filtered = groupedProducts.filter(p => 
          (p.namaDagang && p.namaDagang.toLowerCase().includes(keyword)) ||
          (p.kodeBarangOld && p.kodeBarangOld.toLowerCase().includes(keyword)) ||
          (p.kodeBarangNew && p.kodeBarangNew.toLowerCase().includes(keyword))
        );
        renderGroupedTable(filtered.slice(0, 30));
      }
    });
  });

  async function loadAllProducts() {
    document.getElementById('table-products-container').innerHTML = '<div style="text-align:center; padding:20px; color:var(--primary);"><i data-lucide="loader-2" class="lucide-spin"></i> Menarik Data Master...</div>';
    lucide.createIcons();
    
    try {
      const batches = await GasApi.get('getShortBatchLookup', 1, 5000);
      
      const productMap = new Map();
      batches.forEach(b => {
          const key = b.namaBarangDagang;
          if (!productMap.has(key)) {
              productMap.set(key, {
                  namaDagang: b.namaBarangDagang,
                  kodeBarangOld: b.kodeBarangOld, // Simpen DUA kode!
                  kodeBarangNew: b.kodeBarangNew,
                  batches: []
              });
          }
          productMap.get(key).batches.push(b);
      });

      groupedProducts = Array.from(productMap.values());
      renderGroupedTable(groupedProducts.slice(0, 30)); 
    } catch (error) {
      ToastSystem.show("Gagal narik data produk!", "error");
    }
  }

  function renderGroupedTable(data) {
    if(data.length === 0) {
      document.getElementById('table-products-container').innerHTML = '<div style="text-align:center; padding:20px; color:var(--text-light); font-size:0.85rem;">Tidak ada produk yang cocok.</div>';
      return;
    }

    let html = '<div style="display:flex; flex-direction:column; gap:10px;">';
    
    data.forEach((prod, idx) => {
      html += `
      <div style="border:1px solid var(--border); border-radius:10px; background:#fff; overflow:hidden;">
          <div style="padding:15px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:0.2s;" 
               onclick="toggleBatchList('blist-${idx}')" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
              <div>
                  <strong style="font-size:0.95rem; color:var(--text-main); line-height:1.2; display:block; margin-bottom:4px;">${prod.namaDagang}</strong>
                  <span style="font-size:0.75rem; color:var(--text-light); font-family:monospace;">
                    Old: <span style="font-weight:600; color:var(--text-main);">${prod.kodeBarangOld}</span> | 
                    New: <span style="font-weight:600; color:var(--text-main);">${prod.kodeBarangNew}</span> | 
                    <b style="color:var(--primary);">${prod.batches.length} Batch Aktif</b>
                  </span>
              </div>
              <i data-lucide="chevron-down" style="color:var(--text-light); width:18px;"></i>
          </div>
          
          <div id="blist-${idx}" style="display:none; background:var(--bg-color); border-top:1px solid var(--border); padding:10px;">
              <table class="ui-table" style="font-size:0.75rem; background:#fff; border-radius:8px; margin:0;">
                  <thead><tr><th>Batch</th><th>Exp. Date</th><th style="text-align:right;">Aksi</th></tr></thead>
                  <tbody>`;
                  
      prod.batches.forEach(b => {
          // THE FIX BUG TANGGAL KEPOTONG: 
          // Formatter.date dari util lu balikin misal: "14 Nov 2025, 00:00"
          // Kita pisah di koma aja, ambil bagian depannya!
          const cleanDate = Formatter.date(b.expiryDate).split(',')[0]; 

          html += `
          <tr>
              <td style="font-family:monospace; font-weight:600;">${b.batch}</td>
              <td style="color:#ef4444; font-weight:600;">${cleanDate}</td>
              <td style="text-align:right;">
                  <button class="btn btn-secondary" style="padding:4px 8px; font-size:0.65rem;" onclick="loadAggregate('${b.batch}', '${prod.namaDagang.replace(/'/g, "\\'")}')">Analisis</button>
                  <a href="?page=detail&id=${b.id}" class="btn btn-primary" style="padding:4px 8px; font-size:0.65rem; text-decoration:none;">Detail</a>
              </td>
          </tr>`;
      });

      html += `</tbody></table></div></div>`;
    });
    
    html += '</div>';
    document.getElementById('table-products-container').innerHTML = html;
    lucide.createIcons();
  }

  function toggleBatchList(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }

  // LOGIC AGGREGATE DISTRIBUSI (Biarkan sama persis dengan yang kemaren)
  async function loadAggregate(batchNo, namaProduk) {
    const container = document.getElementById('aggregate-container');
    container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--primary);"><i data-lucide="loader-2" class="lucide-spin" style="width:30px; height:30px;"></i><br><br>Menarik Log Mutasi Fisik...</div>';
    lucide.createIcons();

    if (window.innerWidth < 1024) document.getElementById('aggregate-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });

    try {
      const history = await GasApi.post('getBatchHistory', { batchNo: batchNo });
      const agg = {};
      let runningBalance = 0;
      const historyWithBalance = [];

      const parseIdn = (val) => {
          if (!val) return 0;
          if (typeof val === 'number') return val;
          const str = String(val).replace(/\./g, '').replace(',', '.');
          return parseFloat(str) || 0;
      };

      history.forEach(h => {
        const ket = String(h.keterangan || '').toUpperCase().trim();
        const kons = String(h.namaKonsumen || '').toUpperCase().trim();
        const dist = parseIdn(h.distribusi);
        const pen = parseIdn(h.penerimaan);
        
        if (!ket.includes('REVISI') && !kons.includes('SALDO AWAL')) {
          if (dist > 0) agg[kons] = (agg[kons] || 0) + dist;
          runningBalance += pen;
          runningBalance -= dist;
          historyWithBalance.push({ tanggal: h.tanggal, konsumen: kons, cabang: h.kotaCabang || '-', distribusi: dist, penerimaan: pen, saldo: runningBalance, tipe: dist > 0 ? 'OUT' : 'IN' });
        }
      });

      if (historyWithBalance.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:20px; font-size:0.85rem; color:var(--text-light);">Belum ada riwayat valid untuk <b>${batchNo}</b></div>`;
        return;
      }

      const sortedAgg = Object.keys(agg).map(k => ({ customer: k, total: agg[k] })).sort((a, b) => b.total - a.total).slice(0, 5);
      let html = `<div style="font-weight:800; color:var(--primary); margin-bottom:4px; font-size:1rem; line-height:1.2;">${namaProduk}</div>`;
      html += `<div style="font-size:0.8rem; color:var(--text-light); margin-bottom:15px; font-family:monospace;">Batch: ${batchNo}</div>`;
      
      if(sortedAgg.length > 0) {
        html += `<table class="ui-table" style="font-size:0.75rem; margin-bottom:20px;">
                  <thead><tr><th>Top Distribusi</th><th style="text-align:right;">Total</th></tr></thead><tbody>`;
        sortedAgg.forEach((item, index) => {
          const highlight = index < 3 ? 'font-weight:800; color:var(--text-main);' : '';
          let iconHtml = index === 0 ? `<i data-lucide="trophy" style="width:14px; color:#eab308; margin-right:4px;"></i>` : (index === 1 ? `<i data-lucide="medal" style="width:14px; color:#94a3b8; margin-right:4px;"></i>` : (index === 2 ? `<i data-lucide="medal" style="width:14px; color:#b45309; margin-right:4px;"></i>` : ''));
          html += `<tr><td style="display:flex; align-items:center;">${iconHtml}<span style="${highlight}">${item.customer}</span></td><td style="text-align:right; ${highlight}">${item.total.toLocaleString('id-ID')}</td></tr>`;
        });
        html += `</tbody></table>`;
      }

      const latestHistory = historyWithBalance.reverse().slice(0, 10);
      html += `<div style="font-weight:800; font-size:0.8rem; text-transform:uppercase; color:var(--text-main); margin-bottom:10px; padding-top:10px; border-top:2px dashed var(--border);">10 Transaksi Terakhir</div><div style="display:flex; flex-direction:column; gap:10px;">`;
      latestHistory.forEach(h => {
          const isOut = h.tipe === 'OUT';
          const color = isOut ? '#ef4444' : '#10b981';
          const sign = isOut ? '-' : '+';
          const val = isOut ? h.distribusi : h.penerimaan;
          html += `
          <div style="background:#f8fafc; border:1px solid var(--border); border-left:4px solid ${color}; border-radius:8px; padding:12px; font-size:0.8rem;">
            <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
              <span style="color:var(--text-light); font-size:0.7rem;">${Formatter.date(h.tanggal)}</span>
              <span style="font-weight:800; color:var(--primary);">Stok Akhir: <span style="font-size:0.9rem;">${h.saldo.toLocaleString('id-ID')}</span></span>
            </div>
            <div style="font-weight:800; color:var(--text-main); margin-bottom:4px; line-height:1.3;">${h.konsumen} ${h.cabang !== '-' ? ` - ${h.cabang}` : ''}</div>
            <div style="color:${color}; font-weight:800; font-size:0.9rem;"><i data-lucide="${isOut ? 'arrow-up-right' : 'arrow-down-left'}" style="width:16px;"></i> ${sign}${val.toLocaleString('id-ID')}</div>
          </div>`;
      });
      html += `</div>`;

      container.innerHTML = html;
      lucide.createIcons({ root: container });
    } catch (error) {
      container.innerHTML = `<div style="text-align:center; padding:20px; color:#ef4444; font-size:0.85rem;">Gagal menarik data histori.</div>`;
    }
  }
</script>
