<script>
  /**
   * INITIALIZE PAGE LOGIC
   */
  document.addEventListener('DOMContentLoaded', () => {
    initHomeComponents();
    lucide.createIcons();
  });

  function initHomeComponents() {
    // 1. Render Table Change Log (Agnostik)
    const mockChangeLog = [
      { sheet: 'MASTER_DIST', user: 'Kaye', action: 'Update Stok', time: '10:45' },
      { sheet: 'SHIPLBL_MASTER', user: 'Fitrah', action: 'Cetak Label', time: '09:20' },
      { sheet: 'PM_BATCH', user: 'System', action: 'Auto ED Check', time: '00:01' },
      { sheet: 'CUSTOMER_DB', user: 'Kaye', action: 'Tambah Alamat', time: 'Kemarin' },
      { sheet: 'CONST_PARAM', user: 'Admin', action: 'Ubah Harga Embalage', time: '2 Hari Lalu' }
    ];

    new DataTable({
      containerId: 'container-changelog',
      headers: [
        { label: 'Sheet', key: 'sheet' },
        { label: 'User', key: 'user' },
        { label: 'Aksi', key: 'action' },
        { label: 'Waktu', key: 'time' }
      ],
      data: mockChangeLog
    });

    // 2. Render Search Dropdown (Agnostik)
    const mockProducts = [
      { name: 'Vaksin BCG 10 dosis', batch: 'B20250305' },
      { name: 'Vaksin Polio 20 dosis', batch: 'B1124492' },
      { name: 'Serum Anti Bisa Ular', batch: 'S990224' }
    ];

    new SearchDropdown({
      inputId: 'homeSearchInput',
      dropdownId: 'homeSearchDropdown',
      data: mockProducts,
      searchKeys: ['name', 'batch'],
      renderItem: (item) => `
        <div style="font-weight:700; font-size:0.85rem;">${item.name}</div>
        <div style="font-size:0.7rem; color:var(--text-light);">Batch: ${item.batch}</div>
      `,
      onSelect: (item) => {
        ToastSystem.show(`Membuka detail batch ${item.batch}`, 'info');
      }
    });
  }

  function testLoading(btn) {
    btn.classList.add('loading');
    setTimeout(() => {
      btn.classList.remove('loading');
      ToastSystem.show("Proses pura-pura loading selesai!", "success");
    }, 2000);
  }

  // TESTER FUNCTIONS
  function testToast() {
    ToastSystem.show("Sistem sinkronisasi berhasil dijalankan!", "success");
  }

  function testModal() {
    ModalSystem.show({
      title: 'Peringatan Kadaluarsa',
      body: `
        <p>Terdapat <b>3 produk</b> yang akan expired dalam waktu dekat.</p>
        <ul style="margin-top:10px; padding-left:20px;">
          <li>Batch B2025 - Sisa 12 hari</li>
          <li>Batch C9011 - Sisa 20 hari</li>
        </ul>
      `,
      footerButtons: [
        { text: 'Nanti Saja', type: 'secondary', action: () => ModalSystem.close() },
        { text: 'Cetak Report', type: 'primary', action: () => {
          ToastSystem.show("Laporan sedang di-generate...", "info");
          ModalSystem.close();
        }}
      ]
    });
  }
</script>
