<style>
  /* Filter Bar Styling */
  .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
  .filter-item { display: flex; flex-direction: column; flex: 1; min-width: 150px; }
  .filter-item label { font-size: 0.7rem; font-weight: 800; color: var(--text-light); text-transform: uppercase; margin-bottom: 4px; }
  .filter-item select, .filter-item input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 0.85rem; outline: none; }
  
  /* Interactive Card Styling */
  .metric-card { cursor: pointer; transition: 0.2s; user-select: none; border-bottom: 4px solid var(--border); }
  .metric-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
  .metric-card.m-dist { border-bottom-color: #3b82f6; }
  .metric-card.m-batch { border-bottom-color: #8b5cf6; }
  .metric-subtitle { font-size: 0.7rem; color: var(--text-light); font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  
  /* Accordion Styling */
  .acc-container { display: flex; flex-direction: column; gap: 10px; }
  .acc-item { background: #fff; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .acc-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
  .acc-header:hover { background: #f8fafc; }
  .acc-body { display: none; padding: 0 15px 15px 15px; border-top: 1px dashed var(--border); background: #f8fafc; }
  .acc-body.open { display: block; animation: slideDown 0.3s ease; }
  
  .batch-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .batch-row:last-child { border-bottom: none; }
  
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
</style>

<div class="ui-subheader">
  <div class="ui-subheader-icon" style="background: #e0f2fe; color: #0284c7;"><i data-lucide="bar-chart-2"></i></div>
  <div class="ui-subheader-text">
    <h2>Analytics & Inventory</h2>
    <p>Real-time data distribusi dan kalkulasi stok per produk.</p>
  </div>
</div>

<div class="filter-bar">
  <div class="filter-item">
    <label>Rentang Waktu</label>
    <select id="filterWaktu" onchange="processData()">
      <option value="ALL">Semua Waktu (Termasuk Thn Lalu)</option>
      <option value="THIS_YEAR" selected>Tahun Ini (Berjalan)</option>
      <option value="THIS_MONTH">Bulan Ini</option>
      <option value="LAST_MONTH">Bulan Lalu</option>
    </select>
  </div>
  <div class="filter-item">
    <label>Pilih Produk</label>
    <select id="filterProduk" onchange="processData()">
      <option value="ALL">Semua Produk</option>
      </select>
  </div>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 24px;">
  
  <div class="ui-card metric-card m-dist" onclick="toggleDistCard()">
    <div class="ui-card-body" style="padding: 20px;">
      <div style="color: #3b82f6; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">
        <i data-lucide="arrow-up-right" style="width:14px; vertical-align:text-bottom;"></i> Total Distribusi Keluar
      </div>
      <div style="font-size: 2.2rem; font-weight: 900; color: var(--text-main); line-height: 1;" id="lblDistQty">0</div>
      <div class="metric-subtitle">
        <span id="lblDistMode">Mode: Tahun Ini</span>
        <i data-lucide="refresh-cw" style="width:12px;"></i>
      </div>
    </div>
  </div>

  <div class="ui-card metric-card m-batch" onclick="toggleBatchCard()">
    <div class="ui-card-body" style="padding: 20px;">
      <div style="color: #8b5cf6; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">
        <i data-lucide="layers" style="width:14px; vertical-align:text-bottom;"></i> Status Batch
      </div>
      <div style="font-size: 2.2rem; font-weight: 900; color: var(--text-main); line-height: 1;" id="lblBatchQty">0</div>
      <div class="metric-subtitle">
        <span id="lblBatchMode">Mode: ACTIVE</span>
        <i data-lucide="refresh-cw" style="width:12px;"></i>
      </div>
    </div>
  </div>

</div>

<h3 style="font-size: 1rem; color: var(--text-main); margin-bottom: 12px; font-weight: 800;">Detail Stok Berdasarkan Filter</h3>
<div id="accordion-container" class="acc-container">
  <div style="text-align:center; padding: 40px; color: var(--primary);">
    <i data-lucide="loader-2" class="lucide-spin"></i><br><br>Menghitung Data Real-Time...
  </div>
</div>

<script>
  let RAW_DATA = null;
  let PROCESSED_DATA = [];
  
  // State untuk Interactive Cards
  let distState = 0; // 0: This Year, 1: Last Year, 2: Total
  let batchState = 0; // 0: Active, 1: Inactive, 2: Closed

  document.addEventListener('DOMContentLoaded', () => {
    loadData();
    lucide.createIcons();
  });

  async function loadData() {
    try {
      RAW_DATA = await GasApi.get('getDashboardAnalytics');
      
      // Populate Filter Produk
      const selProd = document.getElementById('filterProduk');
      RAW_DATA.products.forEach(p => {
        selProd.innerHTML += `<option value="${p.kodeBarang}">${p.namaDagang}</option>`;
      });

      processData(); // Panggil fungsi kalkulasi utama
    } catch (e) {
      ToastSystem.show("Gagal memuat data analytics", "error");
    }
  }

  // CORE ENGINE: Cross-Filtering & Aggregation di Browser
  function processData() {
    if (!RAW_DATA) return;

    const waktu = document.getElementById('filterWaktu').value;
    const produk = document.getElementById('filterProduk').value;

    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth();

    // 1. Gabungin & Filter Transaksi berdasarkan Waktu
    let validTransactions = [];

    // Filter Hot Storage (Real-time)
    RAW_DATA.hotTransactions.forEach(trx => {
      let isMatch = false;
      const trxDate = new Date(trx.tanggal);
      
      if (waktu === 'ALL' || waktu === 'THIS_YEAR') isMatch = true;
      else if (waktu === 'THIS_MONTH' && trxDate.getMonth() === currentMonth) isMatch = true;
      else if (waktu === 'LAST_MONTH' && trxDate.getMonth() === (currentMonth - 1)) isMatch = true;

      if (isMatch) validTransactions.push(trx);
    });

    // Masukkan Cold Storage kalau butuh 'ALL'
    if (waktu === 'ALL') {
      validTransactions = validTransactions.concat(RAW_DATA.coldAggregations);
    }

    // 2. Agregasi per Batch
    const batchAgg = new Map(); // Kunci: Batch Number
    validTransactions.forEach(trx => {
      if (!batchAgg.has(trx.batch)) {
        batchAgg.set(trx.batch, { in: 0, out: 0, kodeBarang: trx.kodeBarang });
      }
      const b = batchAgg.get(trx.batch);
      b.in += trx.in;
      b.out += trx.out;
    });

    // 3. Grouping per Produk (Sesuai Filter Produk)
    const productGroup = new Map();
    
    batchAgg.forEach((val, batchNo) => {
      // Terapkan Filter Produk disini
      if (produk !== 'ALL' && val.kodeBarang !== produk) return;

      const prodMaster = RAW_DATA.products.find(p => p.kodeBarang === val.kodeBarang);
      const prodName = prodMaster ? prodMaster.namaDagang : 'Unknown Product';
      const batchMaster = RAW_DATA.batches.find(b => b.batch === batchNo);
      const sysStatus = batchMaster ? batchMaster.sysStatus : 'UNKNOWN';

      if (!productGroup.has(val.kodeBarang)) {
        productGroup.set(val.kodeBarang, { 
          nama: prodName, 
          totalStok: 0, 
          batches: [] 
        });
      }

      const stokAkhir = val.in - val.out;
      const g = productGroup.get(val.kodeBarang);
      g.totalStok += stokAkhir;
      g.batches.push({ batch: batchNo, stok: stokAkhir, out: val.out, status: sysStatus });
    });

    PROCESSED_DATA = Array.from(productGroup.values());
    
    updateCards();
    renderAccordion();
  }

  // LOGIC INTERACTIVE CARDS
  function toggleDistCard() {
    distState = (distState + 1) % 3;
    updateCards();
  }

  function toggleBatchCard() {
    batchState = (batchState + 1) % 3;
    updateCards();
  }

  function updateCards() {
    if (!RAW_DATA) return;

    // --- Kalkulasi Card Distribusi ---
    const distLabels = ['Tahun Ini (Hot)', 'Tahun Lalu (Cold)', 'Total Semua'];
    let totalDist = 0;
    
    if (distState === 0 || distState === 2) {
      totalDist += RAW_DATA.hotTransactions.reduce((sum, trx) => sum + trx.out, 0);
    }
    if (distState === 1 || distState === 2) {
      totalDist += RAW_DATA.coldAggregations.reduce((sum, trx) => sum + trx.out, 0);
    }
    
    document.getElementById('lblDistQty').innerText = totalDist.toLocaleString('id-ID');
    document.getElementById('lblDistMode').innerText = `Mode: ${distLabels[distState]}`;

    // --- Kalkulasi Card Batch ---
    const batchLabels = ['ACTIVE', 'INACTIVE', 'CLOSED'];
    const targetStatus = batchLabels[batchState];
    const countBatch = RAW_DATA.batches.filter(b => b.sysStatus === targetStatus).length;

    document.getElementById('lblBatchQty').innerText = countBatch.toLocaleString('id-ID');
    document.getElementById('lblBatchMode').innerText = `Mode: ${targetStatus}`;
  }

  // RENDER ACCORDION
  function renderAccordion() {
    const container = document.getElementById('accordion-container');
    
    if (PROCESSED_DATA.length === 0) {
      container.innerHTML = `<div style="text-align:center; padding: 20px; background:#fff; border-radius:10px; border:1px solid var(--border);">Tidak ada data mutasi yang cocok dengan filter.</div>`;
      return;
    }

    let html = '';
    PROCESSED_DATA.forEach((prod, index) => {
      const id = `acc-${index}`;
      
      let batchHtml = '';
      prod.batches.forEach(b => {
        let badgeColor = b.status === 'ACTIVE' ? 'success' : (b.status === 'CLOSED' ? 'neutral' : 'danger');
        batchHtml += `
          <div class="batch-row">
            <div>
              <span style="font-family:monospace; font-weight:800; color:var(--primary);">${b.batch}</span>
              <span class="ui-badge ui-badge-${badgeColor}" style="font-size:0.6rem; padding:2px 6px; margin-left:8px;">${b.status}</span>
            </div>
            <div style="font-weight:700;">Stok: ${b.stok.toLocaleString('id-ID')}</div>
          </div>
        `;
      });

      html += `
        <div class="acc-item">
          <div class="acc-header" onclick="toggleAccordion('${id}')">
            <div>
              <div style="font-weight:800; font-size:1rem; color:var(--text-main);">${prod.nama}</div>
              <div style="font-size:0.75rem; color:var(--text-light); margin-top:2px;">${prod.batches.length} Batch tercatat</div>
            </div>
            <div style="display:flex; align-items:center; gap:12px;">
              <div style="text-align:right;">
                <div style="font-size:0.7rem; color:var(--text-light); text-transform:uppercase; font-weight:700;">Total Stok Aktual</div>
                <div style="font-size:1.2rem; font-weight:900; color:#10b981; line-height:1;">${prod.totalStok.toLocaleString('id-ID')}</div>
              </div>
              <i data-lucide="chevron-down" style="color:var(--text-light);"></i>
            </div>
          </div>
          <div id="${id}" class="acc-body">
            <div style="padding-top:10px;">${batchHtml}</div>
          </div>
        </div>
      `;
    });

    container.innerHTML = html;
    lucide.createIcons();
  }

  function toggleAccordion(id) {
    const body = document.getElementById(id);
    body.classList.toggle('open');
  }
</script>
