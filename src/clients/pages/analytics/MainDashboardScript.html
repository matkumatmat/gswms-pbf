<script>
  let compChartInstance = null;
  let catChartInstance = null;

  const cardState = {
    ed: { index: 0, options: ['< 3 bulan', '< 6 bulan', '< 1 bulan'] },
    slow: { index: 0, options: ['> 60 hari', '> 30 hari', '> 90 hari'] },
    in: { index: 0, options: ['Tahun Ini', 'Bulan Ini', 'Bulan Lalu', 'Tahun Lalu', 'Semua Periode'] },
    out: { index: 0, options: ['Tahun Ini', 'Bulan Ini', 'Bulan Lalu', 'Tahun Lalu', 'Semua Periode'] },
    stock: { index: 0, options: ['Tahun Ini', 'Bulan Ini', 'Bulan Lalu', 'Tahun Lalu', 'Semua Periode'] }
  };

  const listStates = {
    'listAscContainer': { sortType: 'qty', dir: 'asc', data: [] },
    'listDescContainer': { sortType: 'qty', dir: 'desc', data: [] },
    'listAzContainer': { sortType: 'name', dir: 'asc', data: [] }
  };

  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    renderAdvancedDashboard();
  });

  function renderAdvancedDashboard() {
    listStates.listAscContainer.data = Array.from({length: 10}, (_, i) => ({ name: `Vaksin Polio Dummy Extra Panjang Sekali Namanya ${i+1} - BCH00${i+1}`, date: '20 Sep 26', qty: Math.floor(Math.random() * 500 + 100) }));
    listStates.listDescContainer.data = Array.from({length: 10}, (_, i) => ({ name: `Serum Anti Bisa Ular Dummy Panjang Bet Dah ${i+1} - BCH00${i+1}`, date: '20 Sep 26', qty: Math.floor(Math.random() * 500 + 100) }));
    listStates.listAzContainer.data = Array.from({length: 10}, (_, i) => ({ name: `Alat Suntik Sekali Pakai Dummy Nomer ${i+1} - BCH00${i+1}`, date: '20 Sep 26', qty: Math.floor(Math.random() * 500 + 100) }));

    applySortAndRender('listAscContainer', 'in');    // Inject Metrik Penerimaan
    applySortAndRender('listDescContainer', 'out');  // Inject Metrik Distribusi
    applySortAndRender('listAzContainer', 'stock');  // Inject Metrik Stok

    // Sync Angka Awal
    document.getElementById('advValIn').innerText = '24,850'; document.getElementById('advValInMob').innerText = '24,850';
    document.getElementById('advValOut').innerText = '18,200'; document.getElementById('advValOutMob').innerText = '18,200';
    document.getElementById('advValStock').innerText = '52,400'; document.getElementById('advValStockMob').innerText = '52,400';

    initCompositionChart();
    initCategoryChart();
  }

  window.toggleListSort = function(containerId) {
    const state = listStates[containerId];
    state.dir = state.dir === 'asc' ? 'desc' : 'asc';
    
    // Pass kembali tipe metriknya berdasarkan container
    let mType = containerId === 'listAscContainer' ? 'in' : (containerId === 'listDescContainer' ? 'out' : 'stock');
    applySortAndRender(containerId, mType);
  }

  function applySortAndRender(containerId, metricType) {
    const state = listStates[containerId];
    if (state.sortType === 'qty') { state.data.sort((a,b) => state.dir === 'asc' ? a.qty - b.qty : b.qty - a.qty); } 
    else { state.data.sort((a,b) => state.dir === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name)); }
    
    let label = state.sortType === 'qty' ? (state.dir === 'asc' ? 'Ascending' : 'Descending') : (state.dir === 'asc' ? 'A - Z' : 'Z - A');
    renderSingleList(containerId, label, state.data, metricType);
    lucide.createIcons();
  }

  // MAGIC INJECTION MOBILE METRICS
  function renderSingleList(containerId, sortLabel, data, metricType) {
    const container = document.getElementById(containerId);
    let iconDir = (sortLabel === 'Ascending' || sortLabel === 'A - Z') ? 'arrow-down-up' : 'arrow-up-down';
    
    let itemsHtml = data.map(item => `
      <div class="adv-list-item">
        <div class="li-left"><div class="li-info" title="${item.name}">${item.name}</div><div class="li-date">${item.date}</div></div>
        <div class="li-qty">${item.qty}</div>
      </div>
    `).join('');

    // Setup Teks & Icon buat Mobile Header
    let mTitle = metricType === 'in' ? 'Penerimaan' : (metricType === 'out' ? 'Distribusi' : 'Stok');
    let mColor = metricType === 'in' ? '#10b981' : (metricType === 'out' ? '#ef4444' : '#0ea5e9');
    
    container.innerHTML = `
      <div class="adv-list-top">
        <div class="mobile-metric" onclick="cycleCard('${metricType}')">
          <div style="font-size:0.65rem; color:var(--text-light); font-weight:800; text-transform:uppercase;">${mTitle} <span id="advPeriod${metricType === 'in' ? 'In' : (metricType === 'out' ? 'Out' : 'Stock')}Mob" style="color:#94a3b8; font-weight:600;">(Tahun Ini)</span></div>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:1.2rem; font-weight:900; color:var(--text-main);" id="advVal${metricType === 'in' ? 'In' : (metricType === 'out' ? 'Out' : 'Stock')}Mob">0</span>
            <span id="advTrend${metricType === 'in' ? 'In' : (metricType === 'out' ? 'Out' : 'Stock')}Mob" class="trend-${metricType === 'in' ? 'up' : (metricType === 'out' ? 'down' : 'neutral')}" style="margin:0;">
              <i data-lucide="${metricType === 'in' ? 'trending-up' : (metricType === 'out' ? 'trending-down' : 'minus')}" style="width:10px;"></i> ${metricType === 'in' ? '12%' : (metricType === 'out' ? '4%' : '0%')}
            </span>
          </div>
        </div>
        <button class="btn-sort-toggle" onclick="toggleListSort('${containerId}')">
          <i data-lucide="${iconDir}" style="width:14px;"></i> ${sortLabel}
        </button>
      </div>
      <div class="adv-list-thead"><div class="th-title">Nama produk - batch</div><div class="th-sub"><span>Tanggal</span><span>Jumlah</span></div></div>
      <div class="adv-list-body">${itemsHtml}</div>
    `;
  }

  // UPDATE STATE (Mencakup Desktop & Mobile)
  window.cycleCard = function(type) {
    const state = cardState[type];
    state.index = (state.index + 1) % state.options.length; 
    const selectedOption = state.options[state.index];

    if (type === 'ed') {
      document.getElementById('advDescED').innerText = `Masa simpan ${selectedOption}`;
      document.getElementById('advCountED').innerText = Math.floor(Math.random() * 50) + 1;
    } 
    else if (type === 'slow') {
      document.getElementById('advDescSlow').innerText = `Tanpa mutasi ${selectedOption}`;
      document.getElementById('advCountSlow').innerText = Math.floor(Math.random() * 30) + 1;
    } 
    else {
      // Tangkep Elemen Desktop
      const periodEl = document.getElementById(type === 'in' ? 'advPeriodIn' : type === 'out' ? 'advPeriodOut' : 'advPeriodStock');
      const valEl = document.getElementById(type === 'in' ? 'advValIn' : type === 'out' ? 'advValOut' : 'advValStock');
      const trendEl = document.getElementById(type === 'in' ? 'advTrendIn' : type === 'out' ? 'advTrendOut' : 'advTrendStock');
      
      // Tangkep Elemen Mobile
      const periodElMob = document.getElementById(type === 'in' ? 'advPeriodInMob' : type === 'out' ? 'advPeriodOutMob' : 'advPeriodStockMob');
      const valElMob = document.getElementById(type === 'in' ? 'advValInMob' : type === 'out' ? 'advValOutMob' : 'advValStockMob');
      const trendElMob = document.getElementById(type === 'in' ? 'advTrendInMob' : type === 'out' ? 'advTrendOutMob' : 'advTrendStockMob');

      const newVal = Math.floor(Math.random() * 80000) + 5000;
      const formattedVal = newVal.toLocaleString('id-ID');

      if(periodEl) periodEl.innerText = `(${selectedOption})`;
      if(periodElMob) periodElMob.innerText = `(${selectedOption})`;
      if(valEl) valEl.innerText = formattedVal;
      if(valElMob) valElMob.innerText = formattedVal;

      let trendClass = 'trend-neutral';
      let trendHtml = `<i data-lucide="minus" style="width:10px;"></i> -`;

      if (selectedOption !== 'Semua Periode') {
        const isUp = Math.random() > 0.5;
        const pct = Math.floor(Math.random() * 25) + 1;
        if (isUp) { trendClass = 'trend-up'; trendHtml = `<i data-lucide="trending-up" style="width:10px;"></i> ${pct}%`; } 
        else { trendClass = 'trend-down'; trendHtml = `<i data-lucide="trending-down" style="width:10px;"></i> ${pct}%`; }
      }

      if(trendEl) { trendEl.className = trendClass; trendEl.innerHTML = trendHtml; }
      if(trendElMob) { trendElMob.className = trendClass; trendElMob.innerHTML = trendHtml; }
    }

    lucide.createIcons();

    // Animasi Update Chart
    if (compChartInstance) { compChartInstance.updateSeries([ Math.floor(Math.random() * 50000) + 10000, Math.floor(Math.random() * 30000) + 5000, Math.floor(Math.random() * 60000) + 20000 ]); }
    if (catChartInstance) { catChartInstance.updateSeries([{ name: 'Vol', data: Array.from({length: 5}, () => Math.floor(Math.random() * 1000) + 100) }]); }
  }

  function initCompositionChart() {
    const options = { series: [45000, 18000, 52000], chart: { type: 'pie', height: 250, animations: { speed: 800, dynamicAnimation: { speed: 800 } } }, labels: ['Penerimaan', 'Distribusi', 'Stok Aktif'], colors: ['#0ea5e9', '#f43f5e', '#10b981'], stroke: { width: 3, colors: ['#ffffff'] }, dataLabels: { enabled: true, style: { fontSize: '12px', fontWeight: 'bold' }, dropShadow: { enabled: true, top: 1, left: 1, blur: 1, opacity: 0.5 } }, legend: { position: 'bottom', markers: { radius: 12 } } };
    compChartInstance = new ApexCharts(document.querySelector("#chartComposition"), options);
    compChartInstance.render();
  }

  function initCategoryChart() {
    const options = { series: [{ name: 'Vol', data: [440, 550, 410, 670, 220] }], chart: { type: 'bar', height: 220, toolbar: { show: false }, animations: { speed: 800, dynamicAnimation: { speed: 800 } } }, plotOptions: { bar: { borderRadius: 6, columnWidth: '55%', distributed: true, dataLabels: { position: 'top' } } }, colors: ['#3b82f6', '#8b5cf6', '#f59e0b', '#10b981', '#06b6d4'], dataLabels: { enabled: true, formatter: function (val) { return val; }, offsetY: -20, style: { fontSize: '10px', colors: ["#475569"] } }, xaxis: { categories: ['Vaksin', 'Serum', 'Alkes', 'Obat', 'Lainnya'], labels: { style: { fontSize: '10px', fontWeight: 600, colors: '#64748b' } }, axisBorder: { show: false }, axisTicks: { show: false }, crosshairs: { width: 1 } }, yaxis: { show: false }, grid: { borderColor: '#e2e8f0', strokeDashArray: 4, yaxis: { lines: { show: true } } }, legend: { show: false }, tooltip: { theme: 'light' } };
    catChartInstance = new ApexCharts(document.querySelector("#chartCategory"), options);
    catChartInstance.render();
  }
</script>
