<script>
  let OLAP_RAW_DATA = null;
  let filteredBatches = [];
  let selectedFilterProductId = 'ALL';

  let compChartInstance = null;
  let catChartInstance = null;

  // --- STATE MANAGEMENT ---
  const cardState = {
    ed: { index: 0, options: [3, 6, 1] },
    slow: { index: 0, options: [60, 30, 90] }
  };

  // THE FIX: Definisi Sort Type Baru! (date = Waktu, qty = Jumlah)
  const listStates = {
    'listAscContainer': { sortType: 'date', dir: 'desc', data: [], metricType: 'in' },    // Penerimaan -> Default: Terbaru
    'listDescContainer': { sortType: 'date', dir: 'desc', data: [], metricType: 'out' },  // Distribusi -> Default: Terbaru
    'listAzContainer': { sortType: 'qty', dir: 'desc', data: [], metricType: 'stock' }    // Stok -> Default: Terbanyak
  };

  document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    initCharts();
    loadOlapData();
  });

  // HELPER FORMAT TANGGAL ("20 Sep 26")
  function formatShortDate(isoString) {
    if (!isoString || isoString === '-') return '-';
    try {
      const d = new Date(isoString);
      if (isNaN(d.getTime())) return '-';
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Ags', 'Sep', 'Okt', 'Nov', 'Des'];
      return `${d.getDate()} ${months[d.getMonth()]} ${String(d.getFullYear()).slice(-2)}`;
    } catch(e) { return '-'; }
  }

  function initCharts() {
    const pieOptions = { 
      series: [0, 0], chart: { type: 'pie', height: 250, animations: { speed: 800 } }, 
      labels: ['Distribusi Keluar', 'Stok Gudang'], colors: ['#f43f5e', '#10b981'], 
      stroke: { width: 3, colors: ['#ffffff'] }, dataLabels: { enabled: true, style: { fontSize: '12px', fontWeight: 'bold' } }, 
      legend: { position: 'bottom', markers: { radius: 12 } } 
    };
    compChartInstance = new ApexCharts(document.querySelector("#chartComposition"), pieOptions);
    compChartInstance.render();

    const barOptions = { 
      series: [{ name: 'Stok', data: [] }], chart: { type: 'bar', height: 220, toolbar: { show: false } }, 
      plotOptions: { bar: { borderRadius: 6, columnWidth: '55%', distributed: true, dataLabels: { position: 'top' } } }, 
      colors: ['#3b82f6', '#8b5cf6', '#f59e0b', '#10b981', '#06b6d4'], 
      dataLabels: { enabled: true, offsetY: -20, style: { fontSize: '10px', colors: ["#475569"] } }, 
      xaxis: { categories: [], labels: { style: { fontSize: '10px', fontWeight: 600 } }, axisBorder: { show: false }, axisTicks: { show: false } }, 
      yaxis: { show: false }, grid: { borderColor: '#e2e8f0', strokeDashArray: 4 }, legend: { show: false } 
    };
    catChartInstance = new ApexCharts(document.querySelector("#chartCategory"), barOptions);
    catChartInstance.render();
  }

  async function loadOlapData() {
    try {
      OLAP_RAW_DATA = await GasApi.get('getDashboardAnalytics');
      if (!OLAP_RAW_DATA || !OLAP_RAW_DATA.batchMart) throw new Error("Data mart OLAP kosong!");

      const katSet = new Set();
      OLAP_RAW_DATA.masterProducts.forEach(p => katSet.add(p.kat));
      const selKat = document.getElementById('filterKategori');
      Array.from(katSet).sort().forEach(k => {
        selKat.innerHTML += `<option value="${k}">${k}</option>`;
      });

      new SearchDropdown({
        inputId: 'prodSearch', dropdownId: 'prodDropdown', data: OLAP_RAW_DATA.masterProducts, searchKeys: ['kode', 'nama'],
        renderItem: (item) => `<div style="font-weight:700; font-size:0.85rem;">${item.nama}</div><div style="font-size:0.75rem; color:var(--text-light);">Kode: ${item.kode} | Kat: ${item.kat}</div>`,
        onSelect: (item) => {
          selectedFilterProductId = item.pId;
          document.getElementById('prodSearch').value = `${item.nama} (${item.kode})`;
          document.getElementById('btnClearFilter').style.display = 'block';
          processData();
        }
      });

      processData();
    } catch (e) {
      console.error("Gagal load OLAP:", e);
      ToastSystem.show("Gagal memuat data analitik: " + e.message, "error");
    }
  }

  function clearProductFilter() {
    selectedFilterProductId = 'ALL';
    document.getElementById('prodSearch').value = '';
    document.getElementById('btnClearFilter').style.display = 'none';
    processData();
  }

  // --- CORE ENGINE ---
// --- CORE ENGINE ---
  function processData() {
    if (!OLAP_RAW_DATA) return;

    const filterWaktu = document.getElementById('filterWaktu').value;
    const filterStatus = document.getElementById('filterStatus').value;
    const filterKat = document.getElementById('filterKategori').value;
    const filterBatchSearch = document.getElementById('filterBatch').value.toUpperCase().trim();

    const today = new Date();
    const cYear = today.getFullYear().toString();
    const cMonthKey = `${cYear}-${String(today.getMonth() + 1).padStart(2, '0')}`;
    let lYear = today.getFullYear(), lMonth = today.getMonth(); 
    if (lMonth === 0) { lYear--; lMonth = 12; }
    const lMonthKey = `${lYear}-${String(lMonth).padStart(2, '0')}`;

    filteredBatches = [];
    const kategoriMap = {};

    OLAP_RAW_DATA.batchMart.forEach(bm => {
      const pm = OLAP_RAW_DATA.masterProducts.find(p => p.pId === bm.pId);
      if (!pm) return;
      
      if (selectedFilterProductId !== 'ALL' && bm.pId !== selectedFilterProductId) return;
      if (filterKat !== 'ALL' && pm.kat !== filterKat) return;
      if (filterStatus !== 'ALL' && String(bm.sys).toUpperCase() !== filterStatus) return;
      if (filterBatchSearch !== '' && !bm.b.includes(filterBatchSearch)) return;

      let qtyIn = 0, qtyOut = 0;
      let lastPeriodIn = 0, lastPeriodOut = 0; 
      
      // DEFAULTS (Global Date)
      let tglIn = bm.firstInDate || bm.rcv; 
      let tglOut = bm.lastOutDate || null;

      if (filterWaktu === 'ALL') { 
        qtyIn = bm.in; qtyOut = bm.out; 
      }
      else if (filterWaktu === 'THIS_YEAR') {
        let minIn = null, maxOut = null;
        Object.keys(bm.trxByMonth).forEach(k => { 
          if (k.startsWith(cYear)) { 
            const m = bm.trxByMonth[k];
            qtyIn += m.in; qtyOut += m.out; 
            if (m.firstIn && (!minIn || new Date(m.firstIn) < new Date(minIn))) minIn = m.firstIn;
            if (m.lastOut && (!maxOut || new Date(m.lastOut) > new Date(maxOut))) maxOut = m.lastOut;
          } 
        });
        tglIn = minIn || tglIn;
        tglOut = maxOut || null;
      }
      else if (filterWaktu === 'THIS_MONTH') { 
        const cData = bm.trxByMonth[cMonthKey];
        if (cData) {
            qtyIn = cData.in; qtyOut = cData.out;
            tglIn = cData.firstIn || tglIn;
            tglOut = cData.lastOut || null;
        }
        lastPeriodIn = bm.trxByMonth[lMonthKey]?.in || 0;
        lastPeriodOut = bm.trxByMonth[lMonthKey]?.out || 0;
      }
      else if (filterWaktu === 'LAST_MONTH') { 
        const lData = bm.trxByMonth[lMonthKey];
        if (lData) {
            qtyIn = lData.in; qtyOut = lData.out;
            tglIn = lData.firstIn || tglIn;
            tglOut = lData.lastOut || null;
        }
      }

      let diffHari = 0;
      if (bm.stok > 0) {
        const lastDate = bm.lastOutDate ? new Date(bm.lastOutDate) : new Date(bm.rcv);
        diffHari = Math.ceil((today - lastDate) / (1000 * 60 * 60 * 24));
      }

      kategoriMap[pm.kat] = (kategoriMap[pm.kat] || 0) + bm.stok;

      filteredBatches.push({
        b: bm.b, namaProduk: pm.nama,
        stok: bm.stok, in: qtyIn, out: qtyOut,
        lastIn: lastPeriodIn, lastOut: lastPeriodOut,
        ed: bm.ed, rslBln: bm.rslBln, slowDays: diffHari,
        tglIn: tglIn, tglOut: tglOut // TANGGAL DINAMIS!
      });
    });

    updateWarnings();
    
// ========================================================
    // MAPPING TABEL (MURNI TANGGAL ASLI DARI DATABASE!)
    // ========================================================
    
    // Tabel 1: Penerimaan
    listStates.listAscContainer.data = filteredBatches
      .filter(b => b.in > 0)
      .map(b => ({ 
        name: `${b.namaProduk} - ${b.b}`, 
        date: formatShortDate(b.tglIn), 
        qty: b.in, 
        rawDate: b.tglIn || '1970-01-01' 
      }));

    // Tabel 2: Distribusi
    listStates.listDescContainer.data = filteredBatches
      .filter(b => b.out > 0)
      .map(b => ({ 
        name: `${b.namaProduk} - ${b.b}`, 
        date: formatShortDate(b.tglOut), 
        qty: b.out, 
        rawDate: b.tglOut || '1970-01-01' 
      }));

    // Tabel 3: Stok
    listStates.listAzContainer.data = filteredBatches
      .filter(b => b.stok > 0)
      .map(b => ({ 
        name: `${b.namaProduk} - ${b.b}`, 
        date: 'Stok Tersedia', 
        qty: b.stok, 
        rawDate: b.tglOut || b.tglIn || '1970-01-01' 
      }));

    applySortAndRender('listAscContainer');
    applySortAndRender('listDescContainer');
    applySortAndRender('listAzContainer');

    calculateMetric('in');
    calculateMetric('out');
    calculateMetric('stock');

    const totalOut = filteredBatches.reduce((s, b) => s + b.out, 0);
    const totalStok = filteredBatches.reduce((s, b) => s + b.stok, 0);
    compChartInstance.updateSeries([totalOut, totalStok]); 

    const sortedKat = Object.keys(kategoriMap).sort((a,b) => kategoriMap[b] - kategoriMap[a]).slice(0, 5);
    catChartInstance.updateSeries([{ name: 'Stok', data: sortedKat.map(k => kategoriMap[k]) }]);
    catChartInstance.updateOptions({ xaxis: { categories: sortedKat } });
  }
  
  function updateWarnings() {
    const limitBulan = cardState.ed.options[cardState.ed.index];
    const edList = filteredBatches.filter(b => b.rslBln > 0 && b.rslBln <= limitBulan);
    document.getElementById('advCountED').innerText = edList.length;
    document.getElementById('advDescED').innerText = `Masa simpan < ${limitBulan} bln`;

    const limitHari = cardState.slow.options[cardState.slow.index];
    const slowList = filteredBatches.filter(b => b.stok > 0 && b.slowDays > limitHari);
    document.getElementById('advCountSlow').innerText = slowList.length;
    document.getElementById('advDescSlow').innerText = `Tanpa mutasi > ${limitHari} hr`;
  }

  function calculateMetric(type) {
    if(type === 'stock') {
      const total = filteredBatches.reduce((s, b) => s + b.stok, 0);
      document.getElementById('advValStock').innerText = total.toLocaleString('id-ID');
      return;
    }

    let total = 0, totalLastPeriod = 0;
    filteredBatches.forEach(b => { total += b[type]; totalLastPeriod += (type === 'in' ? b.lastIn : b.lastOut); });

    const filterWaktu = document.getElementById('filterWaktu').value;
    const wText = document.getElementById('filterWaktu').options[document.getElementById('filterWaktu').selectedIndex].text;

    const valEl = document.getElementById(`advVal${type.charAt(0).toUpperCase() + type.slice(1)}`);
    const periodEl = document.getElementById(`advPeriod${type.charAt(0).toUpperCase() + type.slice(1)}`);
    const trendEl = document.getElementById(`advTrend${type.charAt(0).toUpperCase() + type.slice(1)}`);
    
    if (valEl) valEl.innerText = total.toLocaleString('id-ID');
    if (periodEl) periodEl.innerText = `(${wText})`;

    if (trendEl) {
      if (filterWaktu === 'THIS_MONTH' && totalLastPeriod > 0) {
        const pct = Math.round(((total - totalLastPeriod) / totalLastPeriod) * 100);
        if (pct > 0) { trendEl.className = 'trend-up'; trendEl.innerHTML = `<i data-lucide="trending-up" style="width:10px;"></i> ${pct}%`; } 
        else if (pct < 0) { trendEl.className = 'trend-down'; trendEl.innerHTML = `<i data-lucide="trending-down" style="width:10px;"></i> ${Math.abs(pct)}%`; } 
        else { trendEl.className = 'trend-neutral'; trendEl.innerHTML = `<i data-lucide="minus" style="width:10px;"></i> 0%`; }
      } else {
        trendEl.className = 'trend-neutral'; trendEl.innerHTML = `<i data-lucide="minus" style="width:10px;"></i> -`;
      }
    }
  }

  window.cycleCard = function(type) {
    if (type === 'in' || type === 'out' || type === 'stock') return; 
    const state = cardState[type];
    state.index = (state.index + 1) % state.options.length;
    updateWarnings();
    lucide.createIcons();
  };

  // --- BUTTON LIST TOGGLE ---
  window.toggleListSort = function(containerId) {
    const state = listStates[containerId];
    state.dir = state.dir === 'asc' ? 'desc' : 'asc';
    applySortAndRender(containerId);
  };

  // ========================================================
  // THE FIX: LOGIKA SORTING TANGGAL (WAKTU HEAD / TAIL)
  // ========================================================
  function applySortAndRender(containerId) {
    const state = listStates[containerId];
    
    if (state.sortType === 'date') {
      // Sorting Waktu: Terlama (Asc) / Terbaru (Desc)
      state.data.sort((a,b) => {
        const timeA = new Date(a.rawDate).getTime();
        const timeB = new Date(b.rawDate).getTime();
        return state.dir === 'asc' ? timeA - timeB : timeB - timeA;
      });
    } else {
      // Sorting Qty (Untuk Stok): Terkecil (Asc) / Terbanyak (Desc)
      state.data.sort((a,b) => state.dir === 'asc' ? a.qty - b.qty : b.qty - a.qty);
    }
    
    let label = '';
    if (state.sortType === 'date') label = state.dir === 'asc' ? 'Terlama' : 'Terbaru';
    else label = state.dir === 'asc' ? 'Terkecil' : 'Terbanyak';

    // Setelah diurutin full, baru dipotong 15 tail/head!
    renderSingleList(containerId, label, state.data.slice(0, 15), state.metricType);
    lucide.createIcons();
  }

  function renderSingleList(containerId, sortLabel, data, metricType) {
    const container = document.getElementById(containerId);
    let iconDir = 'arrow-up-down'; // Icon default sorting

    let itemsHtml = data.map(item => `
      <div class="adv-list-item">
        <div class="li-left"><div class="li-info" title="${item.name}">${item.name}</div><div class="li-date">${item.date}</div></div>
        <div class="li-qty">${item.qty.toLocaleString('id-ID')}</div>
      </div>
    `).join('');

    let mTitle = metricType === 'in' ? 'Penerimaan' : (metricType === 'out' ? 'Distribusi' : 'Stok');
    let capType = metricType.charAt(0).toUpperCase() + metricType.slice(1);

    container.innerHTML = `
      <div class="adv-list-top">
        <div class="mobile-metric">
          <div style="font-size:0.65rem; color:var(--text-light); font-weight:800; text-transform:uppercase;">${mTitle}</div>
          <div style="display:flex; align-items:center; gap:6px;">
            <span style="font-size:1.2rem; font-weight:900; color:var(--text-main);" id="advVal${capType}Mob">0</span>
            <span id="advTrend${capType}Mob" class="trend-neutral" style="margin:0;"><i data-lucide="minus" style="width:10px;"></i></span>
          </div>
        </div>
        <button class="btn-sort-toggle" onclick="toggleListSort('${containerId}')">
          <i data-lucide="${iconDir}" style="width:14px;"></i> ${sortLabel}
        </button>
      </div>
      <div class="adv-list-thead"><div class="th-title">Nama produk - batch</div><div class="th-sub"><span>Info</span><span>Jumlah</span></div></div>
      <div class="adv-list-body">${itemsHtml}</div>
    `;
  }
</script>
