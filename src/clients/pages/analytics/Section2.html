<div class="s2-grid-layout" style="margin-top: 20px;">
  
  <div class="s2-row-top">
    
    <div class="s2-hero skel-target">
      <div style="font-size:1.4rem; font-weight:900; color:#fff; margin-bottom:4px; line-height:1.2;" id="s2-hero-name" class="skel-box">Memuat Produk...</div>
      <div style="font-family:monospace; color:#94a3b8; margin-bottom:auto;" id="s2-hero-code" class="skel-box">KODE-XXXX</div>
      
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div style="font-weight:800; color:#38bdf8; font-size:0.85rem;" id="s2-hero-cat" class="skel-box">KATEGORI</div>
        
        <div id="s2-hero-batch-info" style="display: none; text-align: right; z-index: 2;">
          <div style="font-size:0.65rem; color:#94a3b8; text-transform:uppercase; font-weight:800; margin-bottom:2px;">Exp. Date / RSL</div>
          <div style="font-size:0.9rem; font-weight:900; color:#fff;">
            <span id="s2-hero-exp">-</span> 
            <span style="font-size:0.75rem; color:#cbd5e1; font-weight:600;">(<span id="s2-hero-rsl">-</span> Bln)</span>
          </div>
        </div>
      </div>
    </div>

    <div class="s2-metrics skel-target">
      <div class="s2-metric-box">
        <div><div style="color:var(--text-light); font-size:0.7rem; text-transform:uppercase;">Penerimaan</div><div id="s2-met-in" class="skel-box" style="font-size:1.3rem;">000</div></div>
        <div class="s2-met-icon" style="background:#d1fae5; color:#10b981;"><i data-lucide="arrow-down-left"></i></div>
      </div>
      <div class="s2-metric-box">
        <div><div style="color:var(--text-light); font-size:0.7rem; text-transform:uppercase;">Distribusi</div><div id="s2-met-out" class="skel-box" style="font-size:1.3rem;">000</div></div>
        <div class="s2-met-icon" style="background:#fee2e2; color:#ef4444;"><i data-lucide="arrow-up-right"></i></div>
      </div>
      <div class="s2-metric-box">
        <div><div style="color:var(--text-light); font-size:0.7rem; text-transform:uppercase;">Stok Aktual</div><div id="s2-met-stok" class="skel-box" style="font-size:1.3rem; color:var(--primary);">000</div></div>
        <div class="s2-met-icon" style="background:#e0f2fe; color:#0ea5e9;"><i data-lucide="database"></i></div>
      </div>
    </div>

    <div class="ui-card skel-target" style="padding:15px;">
      <div class="s2-card-title" style="justify-content:center;">Top Konsumen Distribusi</div>
      <div id="s2ChartKonsumen" class="skel-box" style="min-height: 160px; width:100%;"></div>
    </div>

  </div>

  <div class="s2-row-bottom">
    
    <div class="ui-card skel-target" style="padding:15px;">
      <div class="s2-card-title">
        <span>Filter Batch</span>
        <div class="s2-toggle-group">
          <button class="s2-toggle-btn active" id="btn-tg-all" onclick="toggleBatchMode('ALL')">Semua</button>
          <button class="s2-toggle-btn" id="btn-tg-stok" onclick="toggleBatchMode('STOK')">Ada Stok</button>
        </div>
      </div>
      <div class="s2-scroll-area" id="s2-batch-container">
        <div class="skel-box" style="height:50px; margin-bottom:8px;"></div>
        <div class="skel-box" style="height:50px; margin-bottom:8px;"></div>
      </div>
    </div>

    <div class="ui-card skel-target s2-history" style="padding:0; overflow:hidden;">
      <div style="padding:15px 15px 10px 15px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border);">
        <div class="s2-card-title" style="margin:0;">Riwayat Mutasi</div>
        <div class="s2-pagination">
          <button id="s2-btn-prev" onclick="changePage(-1)">Back</button>
          <span id="s2-page-info">1 / 1</span>
          <button id="s2-btn-next" onclick="changePage(1)">Next</button>
        </div>
      </div>
      <div class="s2-scroll-area" style="max-height:260px;">
        <table class="s2-table">
          <thead><tr><th>Info Konsumen</th><th>No. Batch</th><th style="text-align:right;">Mutasi</th></tr></thead>
          <tbody id="s2-history-tbody">
            <tr><td class="skel-box" style="height:30px;" colspan="3"></td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="ui-card skel-target" style="padding:15px; display:flex; flex-direction:column; justify-content:space-between;">
      <div id="s2ChartPie" class="skel-box" style="min-height: 150px; width:100%; border-radius:50%;"></div>
      <div style="margin-top:15px; border-top:1px solid var(--border); padding-top:10px;">
        <table class="s2-table" style="background:#f8fafc; border-radius:8px; margin:0;">
          <tbody>
            <tr>
              <td style="padding:6px 10px; border:none; display:flex; align-items:center; gap:6px;">
                <div style="width:10px; height:10px; background:var(--primary); border-radius:3px;"></div> Dist. Reguler
              </td>
              <td style="padding:6px 10px; border:none; text-align:right; font-weight:800;" id="s2-val-reg" class="skel-box">0</td>
            </tr>
            <tr>
              <td style="padding:6px 10px; border:none; display:flex; align-items:center; gap:6px;">
                <div style="width:10px; height:10px; background:var(--tertiary); border-radius:3px;"></div> Stok Aktual
              </td>
              <td style="padding:6px 10px; border:none; text-align:right; font-weight:800;" id="s2-val-stok" class="skel-box">0</td>
            </tr>
            <tr>
              <td style="padding:6px 10px; border:none; display:flex; align-items:center; gap:6px;">
                <div style="width:10px; height:10px; background:var(--secondary); border-radius:3px;"></div> Konsinyasi
              </td>
              <td style="padding:6px 10px; border:none; text-align:right; font-weight:800;" id="s2-val-kon" class="skel-box">0</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

</div>
