post: async (action, payload) => {
    try {
      // 1. Ambil URL dinamis dari tag <base> di MainLayout. Nggak perlu hardcode!
      const appUrl = document.querySelector('base').href;
      const userToken = localStorage.getItem('PBF_TOKEN') || null;

      // 2. Tembak langsung ke doPost() lo pake fetch
      const response = await fetch(appUrl, {
        method: 'POST',
        headers: { 
          // WAJIB text/plain biar GAS nggak nolak pake error CORS Preflight
          'Content-Type': 'text/plain;charset=utf-8' 
        },
        body: JSON.stringify({
          action: action,
          token: userToken,
          data: payload
        })
      });

      // 3. Tangkap respons dari responseHelper() di main.js
      const result = await response.json();

      if (result && result.status === 'error') {
        throw new Error(result.message);
      }
      
      return result.data;
    } catch (error) {
      throw error;
    }
  }};
